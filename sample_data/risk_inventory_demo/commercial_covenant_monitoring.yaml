risks:
- taxonomy_node_id: RIB-BPR
  risk_id: RISK-COVMON-001
  risk_description: Business Process Execution risk in Commercial Covenant Monitoring may not be captured, evidenced, or escalated
    within tolerance, creating financial, regulatory, or reputational exposure for the Commercial Lending operating model.
  risk_event: Commercial Covenant Monitoring experiences a business process execution event that breaches the documented threshold
    before remediation is completed.
  applicability_rationale: Business Process Execution is applicable because Commercial Covenant Monitoring is a high process
    with recurring frequency, measurable exposure, system dependencies, and owner-reviewed evidence.
  confidence: 0.86
  causes:
  - Process - threshold, queue, or evidence dependency
  - Technology - workflow, interface, or access dependency
  - People - owner review or capacity constraint
  consequences:
  - Financial loss or rework
  - Regulatory, customer, or executive escalation
  - Reputational impact if unresolved
  affected_stakeholders:
  - Credit Administration Manager
  - Executive Owner, Commercial Lending
  - Second Line Risk Partner
  - Internal Audit
  impact_scores:
    financial_impact: 3
    regulatory_impact: 2
    reputational_impact: 3
  impact_rationales:
    financial_impact: Exposure is tied to recurring commercial covenant monitoring volume and open remediation items.
    regulatory_impact: Regulatory impact reflects obligations, issue aging, and governance reporting linked to business process
      execution.
    reputational_impact: Reputational impact reflects customer, counterparty, or executive visibility when business process
      execution is outside tolerance.
  overall_impact_score: 3
  overall_impact_rationale: Overall impact is set at 3 because the process has recurring exposure, documented evidence requirements,
    and management visibility for business process execution.
  likelihood_score: 4
  likelihood_rating: High
  likelihood_rationale: Likelihood reflects monthly and quarterly, based on covenant schedule, current issue history, recurring
    volume, and exposure drivers in the generic source pack.
  assumptions:
  - Metrics are fictional and calibrated for demo use.
  - Owners and systems are role-based placeholders.
  mapped_controls:
  - CTL-COVMON-001
  exposure_metrics:
  - metric_name: Business Process Execution exposure count

risk_taxonomy_l1:
- code: OPS
  name: Operational
  definition: Risk of loss from inadequate or failed internal processes, people, systems, or external events affecting day-to-day
    execution.
  level_2_codes:
  - RIB-BPR
  - RIB-IFR
  - RIB-EFR
  - RIB-ORS
  - RIB-TPR
  - RIB-DM
  - RIB-IT
  - RIB-PCM
  - RIB-PHYS
  - RIB-PHYAS
  - RIB-CON
  - RIB-LIT
  - RIB-IP
  - RIB-MDL
  - RIB-RR
- code: CYB
  name: Cyber & Privacy
  definition: Risk of loss from unauthorized access, data exposure, or privacy obligations across customer and employee data.
  level_2_codes:
  - RIB-CYB
  - RIB-PRI
- code: REG
  name: Regulatory Compliance
  definition: Risk of failing to comply with applicable laws, regulations, supervisory expectations, or internal policies.
  level_2_codes:
  - RIB-COM
- code: TAL
  name: Talent
  definition: Risk arising from human capital strategy, employment practices, succession, and workforce capability.
  level_2_codes:
  - RIB-HCM
  - RIB-EMP
root_cause_taxonomy:
- code: RC-PPL-01
  name: Skills & Capacity
  category: People
  description: Insufficient trained staff, surge-capacity gaps, single points of dependence on individual operators.
  examples:
  - Surge volume exceeds trained operator capacity
  - Key-person dependency on a single approver
- code: RC-PPL-02
  name: Awareness & Training
  category: People
  description: Procedural non-compliance driven by knowledge gaps, outdated training, or unclear accountability.
  examples:
  - New-hire onboarding without procedure attestation
  - Annual training not refreshed after policy change
- code: RC-PRC-01
  name: Process Design
  category: Process
  description: Process design does not adequately address the scenario, has unclear ownership, or lacks defined service levels.
  examples:
  - No documented escalation path for aged exceptions
  - Ambiguous segregation between maker and checker
- code: RC-PRC-02
  name: Process Execution
  category: Process
  description: Process exists but is inconsistently followed, has undocumented deviations, or lapsed control activities.
  examples:
  - Skipped end-of-day supervisor sign-off
  - Override used outside documented criteria
- code: RC-PRC-03
  name: Reconciliation & Data Quality
  category: Process
  description: Reconciliation breaks, missing required fields, or upstream data defects propagated downstream.
  examples:
  - Workflow status not reconciled to ledger
  - Required cause-code field left blank
- code: RC-TEC-01
  name: System Availability
  category: Technology
  description: System outage, degraded performance, or interface break interrupting normal processing.
  examples:
  - Workflow platform unavailable during peak hours
  - Core banking interface latency
- code: RC-TEC-02
  name: Access & Entitlements
  category: Technology
  description: Excessive privilege, stale entitlements, or weak segregation enforcement in production systems.
  examples:
  - Privileged user retains access after role change
  - Emergency access not recertified post-event
- code: RC-TEC-03
  name: Change Management
  category: Technology
  description: Untested change, missing rollback, or production deployment outside approved change window.
  examples:
  - Configuration change not reviewed by application owner
- code: RC-EXT-01
  name: Third-Party Performance
  category: External
  description: Vendor SLA miss, vendor outage, or vendor incident notification delay affecting bank operations.
  examples:
  - Message-repair vendor breach of SLA
  - Vendor incident notification > 24 hours
- code: RC-EXT-02
  name: Adversarial Activity
  category: External
  description: Fraud attempt, social engineering, or attempted unauthorized access by external actors.
  examples:
  - Business email compromise targeting wire instructions
  - Synthetic-identity application
- code: RC-EXT-03
  name: Regulatory & Legal Change
  category: External
  description: New regulation, supervisory guidance change, or litigation creating compliance or reporting demand.
  examples:
  - CFPB guidance update on overdraft disclosures
  - State licensing change for commercial lending
control_taxonomy:
- code: CT-PRV
  name: Preventive Controls
  family: Preventive
  description: Controls designed to prevent the risk event from occurring (segregation of duties, system enforcement, dual
    approval).
  typical_evidence:
  - Approval logs
  - System enforcement rules
  - Segregation matrices
- code: CT-DET
  name: Detective Controls
  family: Detective
  description: Controls designed to identify a risk event after occurrence so it can be investigated and resolved.
  typical_evidence:
  - Exception reports
  - Reconciliation outputs
  - Surveillance alerts
- code: CT-COR
  name: Corrective Controls
  family: Corrective
  description: Controls that remediate, recover, or correct a risk event after detection.
  typical_evidence:
  - Issue management records
  - Remediation evidence
  - Post-incident reviews
- code: CT-DIR
  name: Directive Controls
  family: Directive
  description: Policies, procedures, training, and governance setting expectations and accountability.
  typical_evidence:
  - Policy attestations
  - Training completion records
  - Committee minutes

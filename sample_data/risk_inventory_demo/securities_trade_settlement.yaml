    financial_impact: 3
    regulatory_impact: 2
    reputational_impact: 3
  impact_rationales:
    financial_impact: Exposure is tied to recurring securities trade settlement and collateral operations volume and open
      remediation items.
    regulatory_impact: Regulatory impact reflects obligations, issue aging, and governance reporting linked to business process
      execution.
    reputational_impact: Reputational impact reflects customer, counterparty, or executive visibility when business process
      execution is outside tolerance.

  risk_description: Business Process Execution risk in Securities Trade Settlement and Collateral Operations may not be captured,
    evidenced, or escalated within tolerance, creating financial, regulatory, or reputational exposure for the Treasury &
    Liquidity Operations operating model.
  risk_event: Securities Trade Settlement and Collateral Operations experiences a business process execution event that breaches
    the documented threshold before remediation is completed.

risks:
- taxonomy_node_id: RIB-ORS
  risk_id: RISK-LIQ-001
  risk_description: Operational Resiliency risk in Liquidity Stress Monitoring and Escalation may not be captured, evidenced,
    or escalated within tolerance, creating financial, regulatory, or reputational exposure for the Treasury & Liquidity Operations
    operating model.
  risk_event: Liquidity Stress Monitoring and Escalation experiences a operational resiliency event that breaches the documented
    threshold before remediation is completed.
  applicability_rationale: Operational Resiliency is applicable because Liquidity Stress Monitoring and Escalation is a critical
    process with recurring frequency, measurable exposure, system dependencies, and owner-reviewed evidence.
  confidence: 0.86
  causes:
  - Process - threshold, queue, or evidence dependency
  - Technology - workflow, interface, or access dependency
  - People - owner review or capacity constraint
  consequences:
  - Financial loss or rework
  - Regulatory, customer, or executive escalation
  - Reputational impact if unresolved
  affected_stakeholders:
  - Liquidity Risk Manager
  - Executive Owner, Treasury Operations
  - Second Line Risk Partner
  - Internal Audit
  impact_scores:
    financial_impact: 3
    regulatory_impact: 2
    reputational_impact: 3
  impact_rationales:
    financial_impact: Exposure is tied to recurring liquidity stress monitoring and escalation volume and open remediation
      items.
    regulatory_impact: Regulatory impact reflects obligations, issue aging, and governance reporting linked to operational
      resiliency.
    reputational_impact: Reputational impact reflects customer, counterparty, or executive visibility when operational resiliency
      is outside tolerance.
  overall_impact_score: 3
  overall_impact_rationale: Overall impact is set at 3 because the process has recurring exposure, documented evidence requirements,
    and management visibility for operational resiliency.
  likelihood_score: 4
  likelihood_rating: High
  likelihood_rationale: Likelihood reflects daily monitoring with weekly governance review, current issue history, recurring
    volume, and exposure drivers in the generic source pack.
  assumptions:
  - Metrics are fictional and calibrated for demo use.

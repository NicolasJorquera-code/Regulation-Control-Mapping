  risk_id: RISK-PAYREC-001
  risk_description: Data Quality And Reconciliation risk in End-of-Day Wire Reconciliation may not be captured, evidenced,
    or escalated within tolerance, creating financial, regulatory, or reputational exposure for the Payment Operations operating
    model.
  risk_event: End-of-Day Wire Reconciliation experiences a data quality and reconciliation event that breaches the documented
    threshold before remediation is completed.
  applicability_rationale: Data Quality And Reconciliation is applicable because End-of-Day Wire Reconciliation is a critical
    process with recurring frequency, measurable exposure, system dependencies, and owner-reviewed evidence.
  confidence: 0.86
  causes:
  - Process - threshold, queue, or evidence dependency
  - Technology - workflow, interface, or access dependency
  - People - owner review or capacity constraint
  consequences:
  - Financial loss or rework
  - Regulatory, customer, or executive escalation
  - Reputational impact if unresolved
  affected_stakeholders:
  - Treasury Operations Lead
  - Executive Owner, Payment Operations
  - Second Line Risk Partner
  - Internal Audit
  impact_scores:
    financial_impact: 3
    regulatory_impact: 2
    reputational_impact: 3
  impact_rationales:
    financial_impact: Exposure is tied to recurring end-of-day wire reconciliation volume and open remediation items.
    regulatory_impact: Regulatory impact reflects obligations, issue aging, and governance reporting linked to data quality
      and reconciliation.
    reputational_impact: Reputational impact reflects customer, counterparty, or executive visibility when data quality and
      reconciliation is outside tolerance.

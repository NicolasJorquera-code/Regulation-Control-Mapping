- taxonomy_node_id: RIB-MDL
  risk_id: RISK-CLUW-001
  risk_description: Model Performance risk in Commercial Loan Underwriting & Risk Rating may not be captured, evidenced, or
    escalated within tolerance, creating financial, regulatory, or reputational exposure for the Commercial Lending operating
    model.
  risk_event: Commercial Loan Underwriting & Risk Rating experiences a model performance event that breaches the documented
    threshold before remediation is completed.
  applicability_rationale: Model Performance is applicable because Commercial Loan Underwriting & Risk Rating is a high process
    with recurring frequency, measurable exposure, system dependencies, and owner-reviewed evidence.
  confidence: 0.86
  causes:
  - Process - threshold, queue, or evidence dependency
  - Technology - workflow, interface, or access dependency
  - People - owner review or capacity constraint
  consequences:
  - Financial loss or rework
  - Regulatory, customer, or executive escalation
  - Reputational impact if unresolved
  affected_stakeholders:
  - Credit Underwriting Lead
  - Executive Owner, Commercial Lending
  - Second Line Risk Partner
  - Internal Audit
  impact_scores:
    financial_impact: 3
    regulatory_impact: 3
    reputational_impact: 3
  impact_rationales:
    financial_impact: Exposure is tied to recurring commercial loan underwriting & risk rating volume and open remediation
      items.
    regulatory_impact: Regulatory impact reflects obligations, issue aging, and governance reporting linked to model performance.
    reputational_impact: Reputational impact reflects customer, counterparty, or executive visibility when model performance
      is outside tolerance.
  overall_impact_score: 3
  overall_impact_rationale: Overall impact is set at 3 because the process has recurring exposure, documented evidence requirements,
    and management visibility for model performance.
  likelihood_score: 4
  likelihood_rating: High

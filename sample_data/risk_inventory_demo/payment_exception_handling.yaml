executive_summary:
  headline: Payment Exception Handling captures 8 risk records for a high-value erroneous wire-release scenario.
  key_messages:
  - 'The inventory focuses on one process: high-value payment exception repair, release, recall, and reconciliation.'
  - The risk profile is anchored to public erroneous-wire-transfer lessons, payment-system supervisory guidance, and current-period
    control evidence.
  - Priority remediation centers on payment-intent validation, privileged setup access, material incident escalation, and
    GL-to-recall linkage.
  top_residual_risks:
  - RISK-PAYEXC-001 Mistaken high-value payment release
  - RISK-PAYEXC-006 Material payment incident reporting
  - RISK-PAYEXC-008 GL and recall reconciliation linkage
  recommended_actions:
  - Require retained payment notice-to-wire-file comparison evidence before high-value repaired wires are released.
  - Approve a cross-functional material payment incident classification and reporting standard.
  - Link payment exception workflow, recall status, and GL break records before daily close certification.
scenario_basis:
- title: Second Circuit Citibank/Revlon erroneous wire-transfer opinion summary
  url: https://law.justia.com/cases/federal/appellate-courts/ca2/21-487/21-487-2022-09-08.html
  relevance: Public case anchor for mistaken high-value wire release, payment intent ambiguity, and recovery risk.
- title: SDNY Citibank August 11, 2020 wire-transfer findings hosted by NY Fed
  url: https://www.newyorkfed.org/medialibrary/Microsites/fmlg/files/2021/20cv6539-citibank-opinion
  relevance: Detailed public findings on payment setup, approval flow, notice, recall, and recipient response facts.
- title: 'OCC Comptroller Handbook: Payment Systems'
  url: https://occ.gov/publications-and-resources/publications/comptrollers-handbook/files/payment-sys-funds-transfer-activities/index-payment-systems-funds-transfer-activities.html
  relevance: Supervisory reference for payment-system risk management, exception processing, controls, and KRIs.
- title: OCC 2020 Citibank internal-controls enforcement release
  url: https://www.occ.gov/news-issuances/news-releases/2020/nr-occ-2020-132.html
  relevance: Public regulatory context for enterprise risk management, data governance, and internal-control weaknesses.

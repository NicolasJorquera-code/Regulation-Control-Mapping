executive_summary:
  headline: Payment Exception Handling shows one high residual access risk and several medium residual risks tied to escalation, resiliency, and evidence quality.
  key_messages:
  - Six material risk records were generated from a realistic high-value payment exception process, including specific exposure metrics and evidence references.
  - Privileged payment queue access is the highest residual concern because aged entitlement exceptions weaken an otherwise defined access review.
  - Regulatory reporting and operational resiliency require business challenge because reportability triage and manual recovery evidence are not yet fully mature.
  top_residual_risks:
  - 'IT Security / Cybersecurity Risk: High-36'
  - 'Regulatory Reporting Risk: Medium-24'
  - 'Operational Resiliency Risk: Medium-24'
  recommended_actions:
  - Close aged privileged-access exceptions and add segregation evidence to monthly entitlement review.
  - Clarify incident reportability timer starts and add Compliance triage fields to the workflow.
  - Retest manual exception handling at peak volume and collect vendor SLA and continuity evidence.

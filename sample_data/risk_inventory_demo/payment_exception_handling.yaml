version: 1.2.0
risk_appetite_framework:
  statement: Payment Operations has low tolerance for unreconciled or unintended high-value wire release. Any erroneous release
    above the materiality threshold requires same-day executive notification, recall playbook activation, and independent
    challenge.
  effective_date: '2026-04-30'
  approver: Risk Governance Committee
  category_thresholds:
    operational: Medium
    cyber: Low
    regulatory: Low
    talent: Medium
  escalation_rules:
  - Any suspected erroneous high-value payment release must be escalated to Payment Operations leadership within 30 minutes.
  - Unreturned customer, lender, or counterparty funds above the materiality threshold require Legal, Compliance, and 2LOD
    review the same business day.
  - Residual High or Critical requires a named remediation owner, dated action plan, and independent challenge before closure.
scenario:
  run_id: RI-PAYEXC-2026Q2-001
  tenant_id: enterprise-payment-operations
  process_id: PROC-PAY-EXCEPTION
  process_name: Payment Exception Handling
  product: High-value wire exception repair and recall processing
  business_unit: Payment Operations
  description: High-value wire exception process covering payment-intent validation, maker/checker release, payment advice
    reconciliation, recall handling, and same-day escalation after an erroneous payment release.
  systems:
  - Payment Exception Workflow
  - Wire Transfer Gateway
  - Loan Agency Payment Module
  - Payment Intent Validation Service
  - SWIFT Messaging Gateway
  - General Ledger Reconciliation Platform
  stakeholders: &id001
  - Payment Operations Manager
  - Loan Agency Operations Lead
  - Treasury Operations Controller
  - Second Line Operational Risk Partner
  - Legal and Regulatory Response Lead
  - Internal Audit
controls:
- control_id: CTL-PAYEXC-001
  control_name: Payment Intent and Amount Validation
  control_type: Preventive payment validation
  owner: Payment Operations Manager
  frequency: Per high-value exception release
  description: Before release, operations validates payment intent, beneficiary population, value date, principal versus interest
    split, and funding source against the approved payment notice and exception case.
  design_rating: Improvement Needed
  operating_rating: Improvement Needed
  design_rationale: The control defines a maker/checker gate but does not require an independent comparison between the payment
    notice, loan agency instruction, and generated wire file for every high-value repair.
  operating_rationale: Q2 sample testing found two high-value repairs where approvers relied on workflow status rather than
    reviewing the generated payment detail before release.
  risk_mitigations:
    RIB-BPR: Reduces mistaken release risk by forcing intent and amount agreement before a repaired payment exits the bank.
    RIB-DM: Confirms payment notice fields agree to the generated wire file and accounting entries.
  coverage_by_risk:
    RIB-BPR: partial
    RIB-DM: partial
  mapped_root_causes_per_risk:
    RIB-BPR:
    - Process - unclear release criteria
    - People - approver reliance on workflow status
    RIB-DM:
    - Process - payment-intent mismatch
    - Technology - generated wire file not reconciled to notice
  open_issues:
  - issue_id: ISS-PAYEXC-001
    description: High-value repair approval checklist does not require evidence of payment notice-to-wire-file comparison.
    severity: High
    age_days: 46
    owner: Payment Operations Manager
    status: In Remediation
  evidence_quality:
    rating: Needs Refresh
    last_tested: '2026-04-30'
    sample_size: 30
    exceptions_noted: 2
    notes: Testing covered Q2 high-value repairs and found incomplete evidence for independent amount validation.
- control_id: CTL-PAYEXC-002
  control_name: Dual Approval for High-Value Exception Release
  control_type: Segregation of Duties
  owner: Loan Agency Operations Lead
  frequency: Per release above approval threshold
  description: A maker enters the repair instruction and two independent approvers validate beneficiary, amount, payment purpose,
    and release queue before the wire file is released.
  design_rating: Satisfactory
  operating_rating: Improvement Needed
  design_rationale: The maker/checker design requires independent release approval and prohibits the preparer from final release
    authority.
  operating_rationale: The workflow records approvals, but evidence does not always show whether approvers reviewed the underlying
    notice and generated wire detail.
  risk_mitigations:
    RIB-IFR: Limits unauthorized or inappropriate override by separating preparation and release authority.
    RIB-BPR: Adds independent review before high-value exceptions are released.
  coverage_by_risk:
    RIB-IFR: strong
    RIB-BPR: partial
  mapped_root_causes_per_risk:
    RIB-IFR:
    - People - override pressure
    - Process - insufficient independent challenge
    RIB-BPR:
    - People - checker review not evidenced
    - Process - approval quality varies
  open_issues: []
  evidence_quality:
    rating: Adequate
    last_tested: '2026-04-30'
    sample_size: 30
    exceptions_noted: 1
    notes: Approval logs are available, with one sample lacking reviewer notes for payment-purpose validation.
- control_id: CTL-PAYEXC-003
  control_name: Privileged Payment Setup Access Review
  control_type: System and Application Restrictions
  owner: Payment Platform Owner
  frequency: Monthly access review and per emergency access event
  description: Application owner reviews users who can alter payment templates, internal wash-account routing, release queues,
    and high-value override parameters.
  design_rating: Improvement Needed
  operating_rating: Improvement Needed
  design_rationale: The control covers privileged access but does not yet require explicit review of users who can change
    payment-routing defaults or internal account treatment.
  operating_rationale: Two emergency access grants remained open past the target closure date and one privileged role lacked
    manager recertification evidence.
  risk_mitigations:
    RIB-CYB: Reduces unauthorized or stale privileged access to payment setup and release functions.
    RIB-IFR: Contributes to override risk reduction by narrowing access to sensitive payment configuration.
  coverage_by_risk:
    RIB-CYB: partial
    RIB-IFR: partial
  mapped_root_causes_per_risk:
    RIB-CYB:
    - Technology - excessive privileged access
    - Process - recertification evidence gap
    RIB-IFR:
    - Technology - override entitlement drift
    - People - emergency access not closed timely
  open_issues:
  - issue_id: ISS-PAYEXC-003
    description: Privileged payment setup role requires refreshed recertification and emergency access closure evidence.
    severity: High
    age_days: 38
    owner: Payment Platform Owner
    status: In Remediation
  evidence_quality:
    rating: Needs Refresh
    last_tested: '2026-04-30'
    sample_size: 18
    exceptions_noted: 3
    notes: Access review evidence is incomplete for payment-routing default and emergency access privileges.
- control_id: CTL-PAYEXC-004
  control_name: Same-Day Exception Queue Aging and Escalation
  control_type: Exception Reporting
  owner: Payment Operations Manager
  frequency: Intraday and end-of-day
  description: Operations monitors high-value exception queues, aged release cases, recall activity, and unresolved payment
    investigations with same-day escalation thresholds.
  design_rating: Satisfactory
  operating_rating: Satisfactory
  design_rationale: The dashboard defines queue aging, dollar exposure, and recall escalation thresholds for same-day action.
  operating_rationale: Daily dashboard evidence shows queue aging review and escalation notes for all sampled high-value exceptions.
  risk_mitigations:
    RIB-ORS: Supports operational response during payment disruption or recall events.
    RIB-BPR: Detects exceptions that are not progressing through normal release or recall workflow.
  coverage_by_risk:
    RIB-ORS: strong
    RIB-BPR: strong
  mapped_root_causes_per_risk:
    RIB-ORS:
    - Process - aged exception escalation
    - People - surge capacity constraints
    RIB-BPR:
    - Process - delayed exception closure
    - Technology - queue status dependency
  open_issues: []
  evidence_quality:
    rating: Adequate
    last_tested: '2026-04-30'
    sample_size: 25
    exceptions_noted: 0
    notes: Queue aging dashboard and escalation notes are retained for sampled exceptions.
- control_id: CTL-PAYEXC-005
  control_name: Payment Recall and Counterparty Return Playbook
  control_type: Corrective action and third-party coordination
  owner: Treasury Operations Controller
  frequency: Per erroneous release or recall event; quarterly simulation
  description: Operations triggers recall notices, correspondent-bank outreach, legal hold instructions, customer communications,
    and recovery tracking when an erroneous release is suspected.
  design_rating: Strong
  operating_rating: Satisfactory
  design_rationale: The playbook includes owners, timing, external contact paths, recall templates, and executive escalation
    for unreturned funds.
  operating_rationale: Quarterly simulation was completed, but one counterparty contact record was outdated and corrected
    during testing.
  risk_mitigations:
    RIB-TPR: Reduces dependency risk by defining correspondent and recipient response procedures.
    RIB-ORS: Improves recovery speed during an erroneous release incident.
  coverage_by_risk:
    RIB-TPR: strong
    RIB-ORS: strong
  mapped_root_causes_per_risk:
    RIB-TPR:
    - External - counterparty response delay
    - Process - recall contact maintenance
    RIB-ORS:
    - Process - recovery playbook readiness
    - External - recipient return uncertainty
  open_issues: []
  evidence_quality:
    rating: Adequate
    last_tested: '2026-04-15'
    sample_size: 1
    exceptions_noted: 1
    notes: Simulation evidence is retained; one contact maintenance issue was corrected.
- control_id: CTL-PAYEXC-006
  control_name: Material Payment Incident Classification and Reporting
  control_type: Risk Escalation Processes
  owner: Legal and Regulatory Response Lead
  frequency: Per material payment incident
  description: Potential material erroneous payments are assessed for operational-loss classification, customer impact, regulatory
    notification, and executive reporting.
  design_rating: Improvement Needed
  operating_rating: Improvement Needed
  design_rationale: The procedure defines incident classification but thresholds for unsuccessful recall, legal escalation,
    and regulatory notification are not yet aligned across Legal, Compliance, and Operations.
  operating_rationale: The latest tabletop found inconsistent timing assumptions for when a suspected erroneous release becomes
    reportable to senior management.
  risk_mitigations:
    RIB-RR: Supports timely management and regulatory escalation for material payment incidents.
  coverage_by_risk:
    RIB-RR: partial
  mapped_root_causes_per_risk:
    RIB-RR:
    - Process - reporting threshold ambiguity
    - People - fragmented incident ownership
  open_issues:
  - issue_id: ISS-PAYEXC-006
    description: Incident classification thresholds for erroneous payment release need 2LOD and Legal approval.
    severity: High
    age_days: 55
    owner: Legal and Regulatory Response Lead
    status: Open
  evidence_quality:
    rating: Needs Refresh
    last_tested: '2026-04-22'
    sample_size: 3
    exceptions_noted: 2
    notes: Tabletop notes show inconsistent interpretation of escalation timing and materiality.
- control_id: CTL-PAYEXC-007
  control_name: Payment Advice to Wire File Reconciliation
  control_type: Reconciliation
  owner: Loan Agency Operations Lead
  frequency: Per loan-agency payment batch
  description: Loan Agency reconciles approved payment notices, payment-calculation statements, beneficiary lists, and generated
    wire-file totals before release.
  design_rating: Strong
  operating_rating: Satisfactory
  design_rationale: The reconciliation explicitly compares intent, principal and interest components, beneficiaries, and generated
    payment totals.
  operating_rationale: All sampled payment batches tied to approved notices, with one reviewer note added after QA challenge.
  risk_mitigations:
    RIB-DM: Detects mismatches between approved payment intent and generated wire-file data.
  coverage_by_risk:
    RIB-DM: strong
  mapped_root_causes_per_risk:
    RIB-DM:
    - Process - notice-to-wire mismatch
    - Technology - batch generation dependency
  open_issues: []
  evidence_quality:
    rating: Adequate
    last_tested: '2026-04-30'
    sample_size: 24
    exceptions_noted: 1
    notes: Reconciliation package is retained with QA challenge evidence for one sample.
- control_id: CTL-PAYEXC-008
  control_name: GL and Nostro Break Reconciliation for High-Value Wires
  control_type: Reconciliation
  owner: Treasury Operations Controller
  frequency: Daily close
  description: Treasury reconciles wire outflows, internal suspense/wash accounts, nostro confirmations, and general-ledger
    postings to identify unintended or unrecovered payments.
  design_rating: Improvement Needed
  operating_rating: Improvement Needed
  design_rationale: The daily reconciliation detects breaks after release, but it is not yet integrated with pre-release payment-intent
    controls or recall workflow status.
  operating_rationale: Q2 close testing found aged suspense breaks and one case where recall status was not linked to the
    GL break record.
  risk_mitigations:
    RIB-DM: Detects unreconciled payment, suspense, and recall balances after release.
  coverage_by_risk:
    RIB-DM: partial
  mapped_root_causes_per_risk:
    RIB-DM:
    - Process - post-release break aging
    - Technology - GL workflow linkage gap
  open_issues:
  - issue_id: ISS-PAYEXC-008
    description: Recall workflow status is not linked to aged GL and nostro break remediation records.
    severity: High
    age_days: 63
    owner: Treasury Operations Controller
    status: In Remediation
  evidence_quality:
    rating: Needs Refresh
    last_tested: '2026-04-30'
    sample_size: 20
    exceptions_noted: 2
    notes: Close package has aged breaks and incomplete linkage to recall case status.
- control_id: CTL-PAYEXC-009
  control_name: Payment Workflow Change and Release Control
  control_type: System Change Management
  owner: Payment Platform Owner
  frequency: Per change; monthly release review
  description: Technology and Operations review changes to payment workflow routing, release screens, internal account defaults,
    and validation rules before production deployment.
  design_rating: Satisfactory
  operating_rating: Satisfactory
  design_rationale: The change process requires business owner signoff, test evidence, rollback planning, and release approval
    for payment workflow changes.
  operating_rationale: Monthly release review found complete approvals for sampled changes, with no emergency change outside
    the approved window.
  risk_mitigations:
    RIB-BPR: Reduces execution risk from confusing or misconfigured workflow behavior.
    RIB-CYB: Supports control over sensitive payment system changes.
  coverage_by_risk:
    RIB-BPR: strong
    RIB-CYB: strong
  mapped_root_causes_per_risk:
    RIB-BPR:
    - Technology - workflow usability and default behavior
    - Process - release validation
    RIB-CYB:
    - Technology - sensitive configuration change
    - Process - production approval evidence
  open_issues: []
  evidence_quality:
    rating: Adequate
    last_tested: '2026-04-30'
    sample_size: 12
    exceptions_noted: 0
    notes: Release approvals and test evidence are retained in the change record repository.
risks:
- taxonomy_node_id: RIB-BPR
  risk_id: RISK-PAYEXC-001
  risk_description: High-value payment repairs may be released with an amount, beneficiary population, or payment purpose
    that does not match the approved instruction. The exposure arises when release approval is not supported by a retained
    tie-out of the exception case, payment notice, loan-agency instruction, and final wire file.
  risk_event: A repaired wire is released with principal, duplicate proceeds, or an incorrect beneficiary set rather than
    the approved exception amount.
  applicability_rationale: The process repairs and releases high-value wires through manual exception decisions, maker/checker
    approval, generated wire files, and recall procedures; those activities create direct exposure to erroneous-release scenarios
    described in public payment case materials.
  confidence: 0.92
  causes:
  - Control design - release gate does not force notice-to-wire tie-out
  - Execution - approvers can rely on workflow status instead of source evidence
  - Technology - checker screen does not surface final generated wire detail
  consequences:
  - Material operational loss or temporary cash exposure
  - Disputed recovery or delayed return of funds
  - Senior management, legal, and second-line escalation
  affected_stakeholders: *id001
  impact_scores:
    financial_impact: 4
    regulatory_impact: 3
    reputational_impact: 4
  impact_rationales:
    financial_impact: An erroneous high-value wire can create immediate cash exposure and loss uncertainty until recall or
      return is complete.
    regulatory_impact: A material payment-control failure can trigger legal, compliance, operational-risk, and supervisory
      review.
    reputational_impact: Counterparty disputes and delayed recovery can quickly become visible to executives, customers, lenders,
      and external counsel.
  overall_impact_score: 4
  overall_impact_rationale: Impact is Severe because a single incorrect high-value release can combine immediate financial
    exposure, disputed recovery, and executive-level escalation.
  likelihood_score: 3
  likelihood_rating: Medium High
  likelihood_rationale: Likelihood is Medium High because high-value repairs occur daily and current-period testing found
    release approvals without retained evidence of independent payment-intent validation.
  assumptions:
  - Q2 population includes 126 high-value repaired wires and 30 sampled release approvals.
  - Enhanced approval threshold requires retained evidence for amount, beneficiary, value date, and payment-purpose validation.
  mapped_controls:
  - CTL-PAYEXC-001
  - CTL-PAYEXC-002
  - CTL-PAYEXC-004
  - CTL-PAYEXC-009
  exposure_metrics:
  - metric_name: High-value repaired wires reviewed
    metric_value: 126
    metric_unit: items per quarter
    description: Count of repaired or amended wires above the enhanced approval threshold.
    source: Payment Exception MIS Q2 2026
    supports:
    - likelihood
  - metric_name: Payment intent validation exceptions
    metric_value: 2
    metric_unit: exceptions in 30 samples
    description: Sample exceptions where reviewer evidence did not show notice-to-wire comparison.
    source: QA testing workbook
    supports:
    - likelihood
    - impact
  - metric_name: Largest plausible erroneous release
    metric_value: 84.7
    metric_unit: USD millions
    description: Stress amount used for inherent impact calibration.
    source: Scenario tabletop workbook
    supports:
    - impact
  evidence_references:
  - evidence_id: EV-PAYEXC-001
    evidence_type: QA sample
    description: Q2 high-value repair approval sample with payment notice and wire-file comparison results.
    source: QA testing workbook
  - evidence_id: EV-PAYEXC-004
    evidence_type: Dashboard
    description: Same-day queue aging and high-value release dashboard.
    source: Payment Exception Workflow
  risk_appetite:
    threshold: Medium or below
    statement: No high-value repaired wire should be released without retained evidence that the approved notice, case record,
      and final wire file agree.
    status: outside
    category: Business Process Execution
  recommended_action: Embed mandatory pre-release tie-out evidence for high-value repaired wires and block release when notice,
    case, and wire-file fields do not agree.
  action_plan:
  - action: Add a required payment-intent validation checklist to the release workflow and retest 30 high-value repairs after
      implementation.
    owner: Payment Operations Manager
    due_date: '2026-07-31'
    status: In Progress
    priority: High
  coverage_gaps:
  - The release workflow does not yet retain a mandatory tie-out showing that payment notice, exception case, principal/interest
    fields, beneficiary set, and final wire totals agree before release.
  review:
    review_status: Challenged
    reviewer: Second Line Operational Risk Partner
    challenge_comments: Confirm that release evidence proves independent validation of amount, beneficiary population, value
      date, payment purpose, and final wire file for each high-value repair.
    challenged_fields:
    - impact_score
    - control_mapping
    - residual_risk
    ai_original_value:
      likelihood_score: 2
    reviewer_adjusted_value:
      likelihood_score: 3
    reviewer_rationale: Current-period QA exceptions and public erroneous-wire lessons support Medium High frequency until
      the workflow blocks release without retained tie-out evidence.
    approval_status: Draft
- taxonomy_node_id: RIB-DM
  risk_id: RISK-PAYEXC-002
  risk_description: Payment advice, exception workflow, wire-file, and accounting data may diverge during repair processing.
    If those data sets are not reconciled before release, the process can send the wrong amount, payment component, beneficiary
    set, or duplicate instruction.
  risk_event: The generated wire file contains payment fields that do not match the approved notice or loan-agency calculation
    at the point of release.
  applicability_rationale: 'The process depends on multiple authoritative data objects: payment notice, loan-agency calculation,
    exception case, internal account routing, generated wire file, SWIFT message, and GL entry.'
  confidence: 0.9
  causes:
  - Data control - notice-to-wire comparison is not fully automated
  - System dependency - batch generation can transform approved payment fields
  - Process timing - reconciliation occurs after release for some data elements
  consequences:
  - Incorrect or duplicate wire release
  - Unreconciled suspense, nostro, or GL break
  - Delayed recall, recovery, or customer notification
  affected_stakeholders: *id001
  impact_scores:
    financial_impact: 3
    regulatory_impact: 2
    reputational_impact: 3
  impact_rationales:
    financial_impact: Incorrect payment data can drive a high-value release error and create unrecovered cash exposure.
    regulatory_impact: Persistent payment-data mismatch can evidence weak data governance and control execution over funds-transfer
      activity.
    reputational_impact: Visible payment errors can undermine customer, lender, and counterparty confidence in operational
      reliability.
  overall_impact_score: 3
  overall_impact_rationale: Impact is High because payment-data mismatch can directly cause an erroneous release and delay
    detection until after funds have left the bank.
  likelihood_score: 3
  likelihood_rating: Medium High
  likelihood_rationale: Likelihood is Medium High because the process handles recurring batch repairs and Q2 review found
    one case where reviewer notes were added only after second-line challenge.
  assumptions:
  - Wire file generation depends on upstream notice fields, exception-case edits, and internal account routing tables.
  - Same-day reconciliation is required for high-value repair batches and payment-accounting exceptions.
  mapped_controls:
  - CTL-PAYEXC-001
  - CTL-PAYEXC-007
  - CTL-PAYEXC-008
  exposure_metrics:
  - metric_name: Payment notice-to-wire mismatches
    metric_value: 3
    metric_unit: items per quarter
    description: Count of identified field mismatches before or after release.
    source: Loan Agency QA dashboard
    supports:
    - likelihood
  - metric_name: Aged suspense breaks tied to recalls
    metric_value: 4
    metric_unit: items
    description: Open suspense or nostro breaks with unresolved recall linkage.
    source: GL reconciliation platform
    supports:
    - impact
    - likelihood
  - metric_name: High-value batch population
    metric_value: 24
    metric_unit: batches sampled
    description: Sample size for loan-agency payment batch reconciliation.
    source: Loan Agency QA workbook
    supports:
    - impact
  evidence_references:
  - evidence_id: EV-PAYEXC-002
    evidence_type: Reconciliation package
    description: Loan agency payment notice-to-wire-file reconciliation sample.
    source: Loan Agency QA workbook
  - evidence_id: EV-PAYEXC-008
    evidence_type: Close package
    description: Daily GL and nostro break reconciliation extract.
    source: General Ledger Reconciliation Platform
  risk_appetite:
    threshold: Medium or below
    statement: Payment advice, workflow, wire-file, and GL data must agree before release or be escalated through a documented
      same-day exception path.
    status: outside
    category: Data Quality and Reconciliation
  recommended_action: Require automated or independently evidenced notice-to-wire-file comparison before high-value repair
    batches are released.
  action_plan:
  - action: Add exception-case, payment-notice, wire-file, and GL control fields to the daily reconciliation package.
    owner: Treasury Operations Controller
    due_date: '2026-08-15'
    status: Planned
    priority: High
  coverage_gaps:
  - Pre-release data validation does not yet require complete field-level agreement across payment notice, exception case,
    generated wire file, and GL staging record.
  review:
    review_status: Challenged
    reviewer: Data Risk Steward
    challenge_comments: Provide evidence that reconciliations validate final release fields before release rather than only
      identifying breaks after funds movement.
    challenged_fields:
    - control_mapping
    - coverage_gap
    ai_original_value:
      overall_impact_score: 3
    reviewer_adjusted_value:
      overall_impact_score: 3
    reviewer_rationale: High impact is appropriate because data mismatch is a direct release-error driver even where reconciliation
      detects breaks later the same day.
    approval_status: Draft
- taxonomy_node_id: RIB-CYB
  risk_id: RISK-PAYEXC-003
  risk_description: Excessive or stale privileged access to payment setup can weaken high-value payment validation. Users
    with access to routing defaults, release queues, templates, or override parameters could introduce unauthorized configuration
    changes before independent review detects them.
  risk_event: A privileged user changes payment-routing, template, or high-value release settings without timely approval,
    recertification, or closure of emergency access.
  applicability_rationale: The payment workflow includes sensitive configuration for internal account treatment, release queues,
    routing defaults, and high-value override behavior.
  confidence: 0.88
  causes:
  - Access governance - sensitive payment setup roles are not separately recertified
  - Emergency access - closure evidence is not consistently retained
  - Configuration control - routing-default changes are not visible to all control owners
  consequences:
  - Unauthorized payment setup or release-rule change
  - Bypass of validation or maker/checker requirements
  - Audit, cyber, or operational-risk issue
  affected_stakeholders: *id001
  impact_scores:
    financial_impact: 3
    regulatory_impact: 3
    reputational_impact: 3
  impact_rationales:
    financial_impact: A privileged configuration error can affect multiple payment releases before detection.
    regulatory_impact: Weak privileged-access governance over payment systems can create supervisory and audit concern.
    reputational_impact: Unauthorized changes to payment setup can undermine confidence in payment-control integrity.
  overall_impact_score: 3
  overall_impact_rationale: Impact is High because privileged setup access can alter how high-value payments are validated,
    routed, and released at scale.
  likelihood_score: 3
  likelihood_rating: Medium High
  likelihood_rationale: Likelihood is Medium High because current-period evidence identified overdue emergency access and
    incomplete recertification for sensitive payment setup roles.
  assumptions:
  - Privileged roles include access to payment templates, routing defaults, release queues, and override parameters.
  - Emergency access should be closed and independently reviewed within the documented target window.
  mapped_controls:
  - CTL-PAYEXC-003
  - CTL-PAYEXC-009
  exposure_metrics:
  - metric_name: Privileged payment setup users
    metric_value: 14
    metric_unit: users
    description: Users able to modify payment setup or release defaults.
    source: Identity governance extract
    supports:
    - impact
  - metric_name: Emergency access over target age
    metric_value: 2
    metric_unit: grants
    description: Emergency access grants open beyond closure target.
    source: Access governance dashboard
    supports:
    - likelihood
  - metric_name: Unrecertified sensitive roles
    metric_value: 1
    metric_unit: role
    description: Sensitive payment setup role lacking complete manager recertification evidence.
    source: Access recertification package
    supports:
    - likelihood
  evidence_references:
  - evidence_id: EV-PAYEXC-003
    evidence_type: Access review
    description: Payment setup privileged access recertification evidence.
    source: Identity Governance Platform
  - evidence_id: EV-PAYEXC-009
    evidence_type: Change review
    description: Payment workflow release approval and test evidence.
    source: Change Management Repository
  risk_appetite:
    threshold: Low
    statement: Sensitive payment setup and release privileges should have no overdue emergency access and no unrecertified
      access at month end.
    status: outside
    category: Cybersecurity and Privileged Access
  recommended_action: Create a sensitive-payment entitlement review that separately certifies routing defaults, template maintenance,
    high-value queue administration, and emergency access closure.
  action_plan:

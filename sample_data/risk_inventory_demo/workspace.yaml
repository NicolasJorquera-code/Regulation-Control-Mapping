    employee_count: 48
    risk_profile_summary: "Operational and Cyber dominate; daily exception volumes drive Business Process and Data Management exposure."
    procedure_ids: ["PROC-PAY-EXCEPTION", "PROC-PAY-RECON"]
  - bu_id: "BU-RETAIL"
    bu_name: "Retail Banking & Onboarding"
    description: "Branch and digital customer onboarding (CIP/KYC), deposit account opening, and ongoing customer due diligence."
    head: "Head of Retail Banking"
    employee_count: 312
    risk_profile_summary: "Compliance, Privacy, and External Fraud dominate; BSA/AML and Reg E expectations drive control density."
    procedure_ids: ["PROC-CUST-ONBOARD"]
  - bu_id: "BU-COMMLEND"
    bu_name: "Commercial Lending"
    description: "Commercial and industrial loan origination, underwriting, credit administration, and post-close monitoring."
    head: "Chief Credit Officer"
    employee_count: 87
    risk_profile_summary: "Credit, Operational, and Model risk dominate; covenant monitoring and risk rating accuracy drive control focus."
    procedure_ids: ["PROC-CL-UNDERWRITE"]


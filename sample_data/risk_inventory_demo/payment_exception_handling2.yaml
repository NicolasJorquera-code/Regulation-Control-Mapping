      disposition: "Approved with monthly ORC reporting and contingent re-review"
      next_review: "2026-05-31 ORC (monthly until back within appetite)"
      notes: >
        This is the single binding active risk in the PR-16 portfolio.
        ORC has elevated reporting cadence to monthly. CRO has
        personally requested visibility on AP-PR16-02-M1 progress.

  # ---------------------------------------------------------------------------
  # R-PR16-03 — Business Email Compromise (BEC) / fraudulent payment via
  #              exception repair channel
  # ---------------------------------------------------------------------------
  - risk_id: R-PR16-03
    title: "Successful business email compromise or fraudulent payment instruction via exception-repair channel"
    taxonomy_node_id: RIB-EFR
    taxonomy_path: "Operational Risk > External Fraud"
    risk_owner: "Head of Wire Operations"
    risk_owner_role_id: ROLE-WIRE-OPS-HEAD
    second_line_owner: "Financial Crimes / BSA-AML Officer"
    description: >
      An external threat actor — most commonly via business email
      compromise (BEC), but including SIM-swap, vendor-impersonation, and
      compromised customer credentials — submits a fraudulent payment
      instruction or alters a legitimate one. The exception-repair channel
      is a high-value attack surface because (a) repair operators are under
      time pressure and trained to be helpful, (b) callbacks may be skipped
      or accepted via a compromised channel, and (c) repaired payments
      often re-enter the workflow with reduced scrutiny once "investigated."
      One BEC event in February 2026 succeeded for $187K net loss after
      $63K recovery — the basis for elevated residual likelihood scoring.

    risk_event: >
      Release of one or more payments to a fraudulent beneficiary based on
      external-attacker-induced instruction, typically (but not exclusively)
      via the exception-repair channel after the attacker has compromised
      an originator's email account or impersonated a known counterparty.

    causes:
      - cause_id: external.external_malicious_or_criminal_acts
        category: External
        classification: primary
        rationale: >
          The defining act is deliberate criminal misappropriation by an
          external party. BEC remains the FBI's #1 reported business fraud
          type by dollar loss (IC3 2024 Internet Crime Report), making this
          a persistent, well-resourced, evolving threat landscape.
      - cause_id: people.inadequate_knowledge_skills_or_training
        category: People
        classification: contributing
        rationale: >
          The February 2026 BEC event succeeded because the operator
          accepted the customer's apparent confirmation via a reply-all
          email rather than executing the documented out-of-band callback.
          Subsequent training-needs assessment confirmed gaps in BEC
          pattern-recognition for the affected operator cohort.
      - cause_id: process.implementation_or_operating_failure
        category: Process
        classification: contributing
        rationale: >
          The callback control (C-PR16-03) is documented and trained but
          Q1-2026 sample testing showed 4 instances of skipped verification
          across 200 sampled events — implementation drift driven by
          time-pressure on the repair queue.
      - cause_id: technology.inadequate_system_design_or_development
        category: Technology
        classification: contributing
        rationale: >
          The exception-repair workflow does not currently force a
          callback-completion attestation field before allowing release;
          the field exists but is text-free-form rather than
          structured/required, allowing operators to release without
          documenting verification.

    consequences:
      financial:
        - "Direct misappropriation loss at face value of fraudulent payment(s); recovery rates on BEC are highly variable (range 15-50%) and time-decaying — recovery probability falls sharply after T+24h."
        - "Insurance recovery via cyber / crime policy possible but coverage of BEC is widely contested and frequently sublimited."
      regulatory:
        - "SAR filing within 30 days; coordination with FBI IC3 expected on losses ≥$50K."
        - "If pattern emerges, regulator may seek evidence of FFIEC-aligned wire-fraud controls."
      reputational:
        - "Affected customer's confidence is materially damaged; word-of-mouth in commercial-customer networks is significant."
        - "Industry-publication coverage of BEC events involving named institutions is common."
      customer:
        - "Originating customer suffers direct misappropriation; repayment under most agreements is the customer's loss unless institution-side control failure is established."
      legal_litigation:
        - "Customer may pursue claim under UCC Article 4A if institution failed to follow commercially reasonable security procedures — exposure depends heavily on facts of each case."

    affected_stakeholders:
      - "Originating customer (typically commercial)"
      - "Beneficiary bank receiving fraudulent funds (recovery counterparty)"
      - "FinCEN / FBI / law enforcement"
      - "Customer's insurer (where customer carries cyber insurance)"
      - "BSA-AML and Financial Crimes function"
      - "Operational Risk Committee"

    inherent_assessment:
      impact_dimensions:
        financial:
          score: 4
          rationale: >
            BEC events at peer institutions in commercial banking commonly
            run $250K–$2M per successful event; multi-event campaigns
            against single-institution operations have produced $5M+
            cumulative loss exposures. Recovery is materially uncertain.
        regulatory:
          score: 3
          rationale: >
            SAR and law-enforcement coordination required but standard;
            regulator focus is on control adequacy rather than the event
            itself unless pattern emerges.
        reputational:
          score: 3
          rationale: >
            Damages affected customer relationship and segment-level
            reputation; industry coverage is common but rarely franchise-
            threatening unless event is high-profile or pattern.
        customer:
          score: 4
          rationale: >
            Direct, severe customer harm; customer often pursues claim
            against institution. Per-event customer impact is acute.
        liquidity:
          score: 1
          rationale: "Negligible — single events are absorbable."
      aggregate_impact_score: 4
      aggregate_impact_method: "Maximum across dimensions"
      aggregate_impact_band: "Major"
      likelihood_score: 3
      likelihood_band: "Likely"
      likelihood_rationale: >
        Without controls, BEC attack volume against the institution is
        substantial — Q1-2026 SYS-RFE detected 47 attempted fraudulent
        payment instructions matching BEC patterns (4 confirmed attempts
        intercepted at callback; 1 succeeded). Inherent likelihood is
        "Likely" reflecting the high-frequency / well-resourced nature
        of the threat landscape.
      inherent_rating:
        score: 12
        band: "High"
        derivation: >
          Aggregate impact (4 — Major) × likelihood (3 — Likely) = 12.
          Score 12 = lower bound of High band.

    control_mapping:
      - control_id: C-PR16-03
        coverage_role: primary_preventive
        coverage_strength: strong
        addresses_root_causes:
          - external.external_malicious_or_criminal_acts
          - process.implementation_or_operating_failure
        rationale: >
          Out-of-band beneficiary callback is the BEC industry-best-
          practice gold-standard preventive control. Strength is "strong"
          by design (recorded line, two-channel verification, scripted
          questions) but operating effectiveness has shown drift —
          Q1-2026 sample showed 4 skipped verifications. The February 2026
          BEC event is direct evidence of operating failure of this
          control.
      - control_id: C-PR16-09
        coverage_role: secondary_preventive_detective
        coverage_strength: strong
        addresses_root_causes:
          - external.external_malicious_or_criminal_acts
        rationale: >
          Real-time fraud rules engine with anomaly detection caught
          4 confirmed BEC attempts in Q1-2026 before release. Strong
          design (60+ rules, ML-anomaly scoring) and consistent operating
          performance.
      - control_id: C-PR16-01
        coverage_role: tertiary_preventive
        coverage_strength: moderate
        addresses_root_causes:
          - process.implementation_or_operating_failure
        rationale: >
          Dual-approval at high-value threshold provides a second pair of
          eyes on payment release. Moderate against BEC because the
          attacker's instruction is often legitimate-looking on the
          surface — second approver's catch-rate depends on detail-level
          attention rather than systemic check.

    control_environment:
      overall_rating: "Adequate with material findings"
      design_summary: >
        Three-layer defense (callback + fraud rules + dual approval) is
        consistent with FFIEC and FS-ISAC industry guidance for BEC
        defense. Design is sound. Material design weakness is the
        non-mandatory callback-completion attestation field in SYS-WWP,
        which permits operating drift. Compensating control via SYS-RFE
        anomaly detection partially mitigates this design gap.
      operating_summary: >
        Q1-2026 callback compliance was 96% (196 of 200 sampled events).
        4 missed events drove 1 confirmed BEC loss ($187K net of $63K
        recovery). Fraud rules engine performed well — 4 confirmed
        intercepts, 2 internal anomaly flags. Operating effectiveness is
        "Adequate" with clearly identified gap requiring closure.
      open_issues:
        - issue_id: ISS-PR16-009
          summary: "Callback-completion attestation field in SYS-WWP is free-text rather than structured/required"
          status: "Open — Design phase, Q3 close target"
          severity: "High"
        - issue_id: ISS-PR16-010
          summary: "BEC pattern-recognition training refresh required for 11 operators following February 2026 incident root-cause analysis"
          status: "In progress (8 of 11 completed)"
          severity: "Medium"

    residual_assessment:
      impact_dimensions:
        financial: 4
        regulatory: 3
        reputational: 3
        customer: 4
        liquidity: 1
      aggregate_impact_score: 4
      likelihood_score: 2
      likelihood_band: "Unlikely"
      likelihood_rationale: >
        With three-layer defense functioning as designed and attestation
        gap remediation in flight, residual likelihood is "Unlikely" —
        Q1-2026 event-rate of 1 successful event per ~12,000 sampled
        repair-channel events. Likelihood is not "Rare" because the
        attestation gap remains open and the threat environment is
        actively evolving.
      residual_rating:
        score: 8
        band: "Medium"
        derivation: >
          Aggregate impact (4 — Major) × residual likelihood (2 —
          Unlikely) = 8. Score 8 = lower bound of Medium band.
      appetite_status: "Within with conditions"
      appetite_status_rationale: >
        Residual Medium is at the upper edge of stated appetite ("Material
        external-fraud risks should be at Medium-Low or Low after
        controls"). Status is "Within with conditions" because (a) one
        successful BEC event in trailing 12 months consumes the appetite
        for two confirmed events, and (b) the open attestation issue
        (ISS-PR16-009) means residual could deteriorate without
        remediation.
      management_response: "Reduce — Targeted Remediation"
      management_response_rationale: >
        Per management_response_rules.yaml, residual at appetite boundary
        with open issues warrants targeted reduction effort focused on
        closing ISS-PR16-009 (structured attestation) and completing
        ISS-PR16-010 training refresh. Re-score after both close.


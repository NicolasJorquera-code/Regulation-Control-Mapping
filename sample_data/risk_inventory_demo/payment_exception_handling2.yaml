        67-day average time-to-fill for senior-grade roles — reviewer
        flagged execution risk on AP-PR16-02-M1; (2) whether the
        cross-training coverage target of 85% is sufficient given that 5
        of 13 exception types have fewer than 3 trained operators —
        reviewer asked for a per-exception-type minimum-coverage
        commitment; (3) whether the institution should consider a

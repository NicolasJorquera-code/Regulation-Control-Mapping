        current_value: "77% (Q1 2026 sample of 47 items; 11 missed)"
        thresholds:
          green: "≥ 95%"
          amber: "85% – 94%"
          red: "< 85%"
        frequency: "Monthly sample testing"
        owner: "Operational Risk Officer (independent assurance)"
        data_source: "Sample testing memo; SYS-WWP aging dashboard"
        escalation: >
          Amber or Red sustained: ORC monthly report with control
          remediation plan. Currently Red.

    evidence_references:
      - evidence_id: EV-PR16-02-001
        description: "Q1-2026 customer-cutoff breach log with per-event remediation amounts"
        retention: "7 years"
        owner: "Customer Experience"
      - evidence_id: EV-PR16-02-002

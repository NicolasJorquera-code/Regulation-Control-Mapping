fixture_metadata:
  fixture_id: FX-PR16-V2
  fixture_version: "2.0.0"
  schema_version: "risk_inventory_schema_v1.0.0"
  authored_by: "Operational Risk Center of Excellence (ORCoE)"
  authored_date: "2026-04-15"
  last_validated: "2026-05-01"
  review_status: "Approved by Operational Risk Committee (ORC), 2026-04-29"
  notes: >
    This fixture is the canonical demo anchor for the v2 financial-institution
    workspace. It is intended to demonstrate executive-quality risk inventory
    output for a high-stakes operational process. All names, dollar amounts,
    counts, vendor names, and incident references are illustrative — no real
    customer, employee, or institutional data is represented.

# =============================================================================
# 1. SCENARIO — operating context for the process
# =============================================================================

scenario:
  process_id: PR-16
  process_name: "Payment Processing and Settlement (Wire/ACH)"
  business_unit_id: BU-05
  business_unit_name: "Banking Operations"
  process_owner_role: "Head of Banking Operations"
  process_owner_title: "Executive Owner, Payment Operations"
  process_classification: "Critical — Material Operational Process"
  three_lines_of_defense_alignment: "First Line"

  product_service: >
    High-value funds transfer services for retail, commercial, wealth, and
    correspondent-bank clients. In scope: domestic Fedwire, CHIPS for high-value
    USD, FedACH and EPN for ACH credits and debits, SWIFT MT and ISO 20022 MX
    for cross-border, and book transfer between internal accounts.

  materiality_statement: >
    The process clears approximately $87B in daily payment volume across
    roughly 12,400 transactions, of which 1.6 percent (≈ 198 transactions) hit
    the exception queue on an average business day. Single-payment exposures
    routinely exceed $50M; the largest exception in the trailing 12 months
    was $312M. Process failure has direct customer, regulatory, liquidity, and
    reputational consequences and is in scope for OCC continuous monitoring
    and Federal Reserve operational resilience review.

  process_chain:
    - step: "1. Instruction intake"
      detail: "Customer- or system-originated payment instruction received via online banking, host-to-host, branch, treasury workstation, or correspondent SWIFT MT/MX."
    - step: "2. Pre-release validation"
      detail: "Automated rules engine validates fields (account number, beneficiary, currency, format), runs OFAC and PEP screening, AML/fraud scoring, and balance/limit checks."
    - step: "3. Exception classification & queue assignment"
      detail: "Failed validations route to specialist queues by exception type (Sanctions Hold, Format Error, Insufficient Funds, Beneficiary Mismatch, Fraud Alert, Compliance Hold)."
    - step: "4. Exception repair"
      detail: "Specialist investigates, contacts originator or beneficiary bank, repairs payment data, and resubmits — or rejects with documented reason."
    - step: "5. Maker-checker authorization"
      detail: "Repaired payments above threshold require independent second approver. High-value (≥ $1M) requires Operations Team Lead; very high-value (≥ $10M) requires Manager, Wire Operations."
    - step: "6. Release to network"
      detail: "Payment released to Fedwire (cut-off 6:30 PM ET), CHIPS (cut-off 5:00 PM ET), FedACH/EPN, or SWIFT outbound queue."
    - step: "7. Settlement confirmation"
      detail: "Settlement confirmation matched against outbound payment record. Failures trigger investigation."
    - step: "8. Recall handling"
      detail: "If instruction was wrong, fraudulent, or duplicate, recall request initiated under FRB Operating Circular 6 (Fedwire) or NACHA Reversal rules."
    - step: "9. Reconciliation"
      detail: "Daily reconciliation of nostro accounts, suspense accounts, and GL posting against settled outbound and inbound payment files."
    - step: "10. Reporting"
      detail: "Internal incident reporting (OpsRisk system), regulatory reporting (CTR, SAR where applicable), and management exception aging dashboards."

  systems:
    - system_id: SYS-WWP
      name: "Wire Workflow Platform (WWP)"
      role: "Primary payment exception management and approval workflow"
      criticality: "Tier 1 — Critical"
      hosting: "On-premises, dual-active datacenter"
    - system_id: SYS-CBP
      name: "Core Banking Platform (CBP)"
      role: "Account ledger, balance check, GL posting"
      criticality: "Tier 1 — Critical"
      hosting: "On-premises"
    - system_id: SYS-SSE
      name: "Sanctions Screening Engine (SSE)"
      role: "Real-time OFAC and consolidated sanctions list screening"
      criticality: "Tier 1 — Critical"
      hosting: "Hybrid (vendor SaaS with on-prem rule set)"
    - system_id: SYS-RFE
      name: "Real-Time Fraud Engine (RFE)"
      role: "Transaction anomaly scoring, BEC pattern detection"
      criticality: "Tier 1 — Critical"
      hosting: "Vendor SaaS"
    - system_id: SYS-NRT
      name: "Nostro Reconciliation Tool (NRT)"
      role: "Daily nostro and suspense account reconciliation"
      criticality: "Tier 2 — High"
      hosting: "On-premises"
    - system_id: SYS-IAM
      name: "Identity and Access Management Platform (IAM)"
      role: "User provisioning, privileged access, role recertification"
      criticality: "Tier 1 — Critical"
      hosting: "On-premises"
    - system_id: SYS-FED
      name: "Fedwire Participant Interface"
      role: "Federal Reserve high-value funds transfer network"
      criticality: "Tier 1 — Critical"
      hosting: "Federal Reserve Bank (external network)"
    - system_id: SYS-SWIFT
      name: "SWIFT Alliance Access"
      role: "International correspondent payment messaging"
      criticality: "Tier 1 — Critical"
      hosting: "On-premises with SWIFT network connection"

  upstream_dependencies:
    - "Customer-facing channels (online banking, treasury workstation, branch)"
    - "Host-to-host payment files from corporate clients"
    - "Inbound SWIFT messages from correspondent banks"
    - "Internal transfer requests from Wealth Management and Commercial Banking"

  downstream_dependencies:
    - "General Ledger close and Financial Reporting (PR-32)"
    - "Customer Appeals, Grievances and Disputes (PR-20)"
    - "Treasury, Cash and Liquidity Management (PR-34)"
    - "BSA/AML investigations and SAR filing (PR-29 adjacent)"
    - "External: Fedwire, CHIPS, ACH operators, correspondent banks"

  data_objects:
    - "Payment instructions and exception case records"
    - "Beneficiary account details and remittance information"
    - "Customer authentication and authorization audit trail"
    - "Sanctions and fraud screening hits and dispositions"
    - "Outbound and inbound settlement files and confirmations"
    - "Nostro and suspense account entries"
    - "Recall requests and dispositions"
    - "Incident reports, RCAs, and customer remediation logs"

  stakeholders:
    internal:
      - "Wire Operations Specialist (Maker)"
      - "Wire Operations Team Lead (Checker)"
      - "Payment Exception Specialist"
      - "Manager, Wire Operations"
      - "Manager, Wire Operations Quality Assurance"
      - "Head of Banking Operations"
      - "BSA/AML Compliance Officer"
      - "OFAC Sanctions Officer"
      - "Fraud Investigations — Wire & ACH"
      - "Treasury Liaison (intra-day liquidity)"
      - "IT Operations — Payments Platform Administrator"
      - "IT Identity & Access Management Analyst"
      - "Internal Audit (3rd line)"
      - "Operational Risk Officer (2nd line)"
    external:
      - "Originating customers (retail, commercial, wealth)"
      - "Beneficiary banks and correspondent banks"
      - "Federal Reserve Bank (Fedwire participant supervision)"
      - "OCC (continuous monitoring team)"
      - "FinCEN (BSA/AML reporting)"
      - "OFAC (sanctions enforcement)"

  applicable_obligations:
    - obligation_id: REG-OBL-REGE
      framework: "Regulation E (Electronic Fund Transfers Act)"
      relevance: "Consumer EFT error resolution timelines and liability allocation."
    - obligation_id: REG-OBL-REGJ
      framework: "Regulation J / FRB Operating Circular 6"
      relevance: "Funds transfers via Fedwire — settlement, recall, and finality rules."
    - obligation_id: REG-OBL-UCC4A
      framework: "UCC Article 4A (Funds Transfers)"
      relevance: "Allocation of risk of loss in commercial wire transfers."
    - obligation_id: REG-OBL-NACHA
      framework: "NACHA Operating Rules"
      relevance: "ACH origination, return, and reversal rules and warranties."
    - obligation_id: REG-OBL-BSAAML
      framework: "Bank Secrecy Act / AML"
      relevance: "Suspicious Activity Report (SAR) filing for unusual payment patterns."
    - obligation_id: REG-OBL-OFAC
      framework: "OFAC Sanctions Compliance"
      relevance: "Real-time screening and blocking of payments to sanctioned parties."
    - obligation_id: REG-OBL-OCCHS
      framework: "OCC Heightened Standards (12 CFR Part 30, Appendix D)"
      relevance: "Operational risk governance, three-lines-of-defense, risk appetite."
    - obligation_id: REG-OBL-FFIEC-WPS
      framework: "FFIEC Wholesale Payment Systems IT Examination Handbook"
      relevance: "Payment system controls, resilience, and information security."

  prior_incidents_referenced:
    - incident_id: "INC-2024-Q3-WIRE-001"
      summary: "Aged exception case (4h12m past SLA) caused customer treasury settlement delay; $1.4M overdraft fee remediated to customer; root cause: queue assignment misconfiguration after platform upgrade."
      management_response: "Issue ISS-2024-Q3-008, closed 2024-Q4 with platform configuration change and SLA monitor rebuild."
    - incident_id: "INC-2025-Q1-BEC-003"
      summary: "Attempted BEC: spoofed CFO email requesting $4.7M wire to new beneficiary. Real-time fraud engine flagged via beneficiary anomaly score; payment held pre-release; loss avoided."
      management_response: "No customer impact. Fraud Investigations enhanced beneficiary risk-scoring model with this pattern."

  scenario_description: |
    On any given business day, Banking Operations clears tens of thousands of
    payment instructions across multiple networks, of which a small but
    non-trivial fraction hit the exception queue and require human repair.
    The exception channel is simultaneously the operational pressure-relief
    valve (fixing what automation cannot) and the most concentrated source of
    operational risk in the payment chain — every override, every manual
    repair, every authorization decision is a potential point of loss,
    regulatory finding, fraud entry-point, or customer harm.

    This fixture describes the inherent risks present in that channel, the
    controls operating against them, the residual risk position after control
    effectiveness is considered, the leading and lagging indicators monitored
    by Operations and Risk, and the active management actions in place to
    reduce residual exposure where it is approaching or breaching appetite.

# =============================================================================
# 2. RISK APPETITE FRAMEWORK — for this process
# =============================================================================

risk_appetite_framework:
  framework_id: RAF-PR16-V2
  effective_date: "2026-01-01"
  approver: "Operational Risk Committee (ORC)"
  approver_role: "Chair: Chief Risk Officer"
  next_review: "2026-12-31"
  parent_framework: "Enterprise Risk Appetite Statement v4.2 (2026)"

  appetite_statement: >
    The Bank has low appetite for operational losses arising from the payment
    processing and settlement process, and zero appetite for losses arising
    from inadequate sanctions screening, internal fraud, or systemic process
    failures that cause material customer harm. The Bank accepts a defined
    level of operational losses arising from human error and external fraud
    inherent to the volume and velocity of high-value payments, provided such
    losses are detected, investigated, remediated, and learned from within
    documented timelines.

  qualitative_thresholds:
    - dimension: "Internal fraud or unauthorized payment release"
      appetite: "Zero"
      narrative: "Any confirmed internal fraud event triggers immediate Risk Committee escalation and Board notification."
    - dimension: "Sanctions screening failure"
      appetite: "Zero"
      narrative: "Any confirmed OFAC or sanctions list miss on a released payment triggers immediate self-disclosure to OFAC and Board notification."
    - dimension: "Customer financial harm > $250k from process failure"
      appetite: "Zero"
      narrative: "Any single-incident customer harm above $250k requires Board-level remediation oversight."
    - dimension: "Aged exception backlog beyond SLA"
      appetite: "Low"
      narrative: "Sustained breach of SLA aging thresholds for two consecutive weeks triggers escalation to ORC."
    - dimension: "Payment platform unavailability during settlement window"
      appetite: "Low"
      narrative: "Any outage of >15 minutes during the Fedwire or CHIPS settlement window triggers operational resilience review."

  quantitative_thresholds:
    - threshold_id: AT-PR16-01
      metric: "Operational losses from payment process (rolling 12 months, $)"
      green: "< $750k"
      amber: "$750k – $1.5M"
      red: "> $1.5M"
      escalation_at_amber: "Quarterly review at Operational Risk Committee"
      escalation_at_red: "Immediate notification to CRO; ad-hoc Risk Committee session"
    - threshold_id: AT-PR16-02
      metric: "Open exceptions aged > 4 hours (intra-day, count)"
      green: "< 5"
      amber: "5 – 14"
      red: "≥ 15"
      escalation_at_amber: "Manager, Wire Operations notified; staffing review"
      escalation_at_red: "Head of Banking Operations notified; mandatory after-action review"
    - threshold_id: AT-PR16-03
      metric: "Sanctions screening miss (per quarter, count)"
      green: "0"
      amber: "n/a — zero appetite"
      red: "≥ 1"
      escalation_at_amber: "n/a"
      escalation_at_red: "Immediate OFAC self-disclosure; Board notification"
    - threshold_id: AT-PR16-04
      metric: "BEC / external fraud confirmed loss (rolling 12 months, $)"
      green: "< $200k"
      amber: "$200k – $500k"
      red: "> $500k"
      escalation_at_amber: "Quarterly fraud governance forum"
      escalation_at_red: "CRO and General Counsel notification"
    - threshold_id: AT-PR16-05
      metric: "Override approvals on high-value wires (rolling 30 days, count)"
      green: "< 6"
      amber: "6 – 9"
      red: "≥ 10"
      escalation_at_amber: "Manager, Wire Operations Quality Assurance review"
      escalation_at_red: "Head of Banking Operations review with Internal Audit notification"
    - threshold_id: AT-PR16-06
      metric: "Payment platform unplanned downtime in settlement window (rolling 90 days, minutes)"
      green: "< 5"
      amber: "5 – 14"
      red: "≥ 15"
      escalation_at_amber: "Quarterly operational resilience review"
      escalation_at_red: "Immediate post-incident review; Federal Reserve notification per OCC HS"

  escalation_protocol: |
    Amber thresholds trigger first-line management review and second-line
    Operational Risk monitoring within five business days. Red thresholds
    trigger same-day notification to the Head of Banking Operations and the
    Operational Risk Committee Chair, with a written 72-hour incident report
    and management response. Repeated red breaches in any rolling 90-day
    window are reported to the Risk Committee of the Board.

# =============================================================================
# 3. CONTROLS — the existing baseline operating against the risks below
# =============================================================================

controls:

  - control_id: C-PR16-01
    name: "Dual approval for high-value wire releases"
    control_type: "Authorization"
    placement: "Preventive"
    method: "Manual with system support"
    description: >
      Wire releases with face value ≥ $1M require independent dual approval
      (maker by Wire Operations Specialist, checker by Wire Operations Team
      Lead). Releases ≥ $10M require Manager, Wire Operations as the second
      approver. The Wire Workflow Platform (WWP) enforces the approval routing
      based on the payment amount and beneficiary risk score, prevents the same
      user from approving their own preparation, and writes a non-repudiable
      audit entry for every approval action.
    owner_role: "Manager, Wire Operations"
    accountable_executive: "Head of Banking Operations"
    frequency: "Per transaction (continuous, real-time)"
    automation_level: "Hybrid (system-enforced routing; human approval action)"
    primary_systems: [SYS-WWP, SYS-IAM]
    evidence_artifacts:
      - "Daily WWP approval audit log (retained 7 years)"
      - "Quarterly approval pattern analytics report"
      - "Annual control self-assessment with Internal Audit attestation"
    design_assessment:
      rating: "Strong"
      narrative: >
        Control design aligns with FFIEC Wholesale Payment Systems guidance and
        OCC Heightened Standards expectations for segregation of duties.
        System-enforced routing prevents the most common design failure mode
        (same-user prepare and approve). Threshold tiering matches loss
        severity progression.
    operating_assessment:
      rating: "Satisfactory"
      narrative: >
        Control operates as designed for routine releases. Quarterly testing
        in Q4-2025 and Q1-2026 found 100% of sampled releases (n=120) had
        compliant dual approval. Two override approvals in Q1-2026 (under
        the emergency override authority) were reviewed post-event and
        determined to be appropriate; however, the override pathway itself
        is the focus of issue ISS-PR16-001.
    open_issues:
      - issue_id: ISS-PR16-001
        title: "Emergency override authority exceeds documented appetite tolerance"
        severity: "Medium"
        target_close: "2026-Q3"
    addresses_root_causes:
      - "people.internal_malicious_acts"
      - "people.human_error"
      - "process.implementation_or_operating_failure"
    covers_risks: [R-PR16-01, R-PR16-04, R-PR16-07]

  - control_id: C-PR16-02
    name: "Exception aging dashboard and SLA-based escalation"
    control_type: "Exception Reporting"
    placement: "Detective"
    method: "Automated with manual component"
    description: >
      The WWP generates a real-time exception aging dashboard refreshed every
      five minutes, classifying open exceptions by SLA bucket (within SLA,
      approaching SLA, breached SLA). At the 60-minute mark, exceptions auto-
      escalate to the Wire Operations Team Lead via WWP and email; at the
      4-hour mark they auto-escalate to the Manager, Wire Operations and
      Manager, Wire Operations Quality Assurance, and a daily aging report is
      delivered to the Head of Banking Operations.
    owner_role: "Wire Operations Team Lead"
    accountable_executive: "Manager, Wire Operations"
    frequency: "Continuous (5-minute refresh)"
    automation_level: "Automated (system-generated alerts and reports)"
    primary_systems: [SYS-WWP]
    evidence_artifacts:
      - "Daily aged exception report (retained 7 years)"
      - "Monthly SLA breach trend analysis"
      - "Quarterly executive aging dashboard"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Design is aligned with the regulatory expectation to identify and
        resolve payment exceptions in a timely manner. The 60-minute and
        4-hour escalation thresholds were calibrated against UCC 4A and Reg E
        error resolution timelines. The dashboard, however, does not
        differentiate by exception type — sanctions and fraud holds are
        treated identically to format errors despite different urgency.
    operating_assessment:
      rating: "Improvement Needed"
      narrative: >
        Control operates as designed for the underlying SLA monitoring, but
        Q1-2026 testing found that the 4-hour escalation alert was missed in
        4 of 18 sampled aged cases (22%) due to email distribution list
        configuration issues. Additionally, INC-2024-Q3-WIRE-001 demonstrated
        that queue assignment misconfiguration can mask aging from the
        dashboard entirely.
    open_issues:
      - issue_id: ISS-PR16-002
        title: "Exception aging dashboard distribution list integrity failures"
        severity: "Medium"
        target_close: "2026-Q2"
      - issue_id: ISS-PR16-003
        title: "Aging dashboard does not differentiate exception type urgency"
        severity: "Low"
        target_close: "2026-Q4"
    addresses_root_causes:
      - "process.design_failure"
      - "process.implementation_or_operating_failure"
      - "people.inadequate_workforce_management_resourcing"
    covers_risks: [R-PR16-02, R-PR16-08]

  - control_id: C-PR16-03
    name: "Out-of-band beneficiary callback verification"
    control_type: "Verification and Validation"
    placement: "Preventive"
    method: "Manual"
    description: >
      For payment instructions received via email, instructions involving a
      first-time beneficiary, or instructions where the beneficiary or amount
      varies materially from the originator's historical pattern, the Payment
      Exception Specialist must initiate a callback to the originator using a
      contact number obtained from a system-of-record other than the
      instruction itself (typically the Customer Relationship Management
      system or a previously verified phone number on file). The callback,
      identity-verification questions used, and authorization confirmation
      are recorded in WWP before the payment can be released.
    owner_role: "Payment Exception Specialist"
    accountable_executive: "Manager, Wire Operations"
    frequency: "Per qualifying transaction"
    automation_level: "Manual (system flags qualifying transactions; specialist performs callback)"
    primary_systems: [SYS-WWP, SYS-CBP]
    evidence_artifacts:
      - "Callback log entries in WWP (retained 7 years)"
      - "Monthly fraud governance forum review of callback adherence"
      - "Annual fraud control effectiveness review"
    design_assessment:
      rating: "Strong"
      narrative: >
        Out-of-band verification is the industry standard preventive control
        against business email compromise (BEC) and impersonation fraud per
        FFIEC, FBI IC3, and ABA fraud guidance. Trigger criteria are
        well-defined and align with documented BEC patterns. The use of a
        non-instruction-derived contact source is the central design strength.
    operating_assessment:
      rating: "Satisfactory"
      narrative: >
        Control operates as designed. Q1-2026 testing of 95 sampled qualifying
        transactions found callbacks performed on 91 (96%); the 4 missed cases
        were retrospectively determined to not have triggered the system
        flag due to a beneficiary risk-score lag (now remediated). One
        successful BEC attempt in the trailing 18 months (INC-2025-Q1-BEC-003)
        was caught by C-PR16-09 before it required this control to fire.
    open_issues: []
    addresses_root_causes:
      - "external.external_malicious_or_criminal_acts"
      - "external.client_conduct_or_error"
      - "people.inadequate_knowledge_skills_or_training"
    covers_risks: [R-PR16-03]

  - control_id: C-PR16-04
    name: "Real-time sanctions screening at payment release"
    control_type: "Automated Rules"
    placement: "Preventive"
    method: "Automated"
    description: >
      Every payment is screened against the OFAC SDN list, OFAC Consolidated
      Sanctions List, EU sanctions, UN sanctions, and the Bank's internal
      blocked-party watchlist at three checkpoints: instruction intake,
      pre-repair (after exception specialist edits), and final release.
      Hits are immediately suspended and routed to the OFAC Sanctions Officer
      queue for adjudication. The Sanctions Screening Engine (SSE) is updated
      within 60 minutes of any list publication via vendor data feed and
      internal escalation channel.
    owner_role: "OFAC Sanctions Officer"
    accountable_executive: "Chief BSA/AML Compliance Officer"
    frequency: "Continuous (per transaction)"
    automation_level: "Automated (deterministic + fuzzy match algorithms)"
    primary_systems: [SYS-SSE, SYS-WWP]
    evidence_artifacts:
      - "SSE daily screening log (retained 7 years per OFAC recordkeeping)"
      - "Monthly false-positive and tuning analysis"
      - "Quarterly sanctions list update audit trail"
      - "Annual independent BSA/AML and OFAC audit (most recent: 2025-Q4)"
    design_assessment:
      rating: "Strong"
      narrative: >
        Triple-checkpoint screening (intake, post-repair, release) is
        specifically designed to defeat the threat vector where a payment
        is repaired in a way that introduces a sanctions hit not present at
        intake — historically the most common path to a screening miss.
        Fuzzy match thresholds are tuned quarterly based on false-positive
        and false-negative analysis.
    operating_assessment:
      rating: "Strong"
      narrative: >
        Zero confirmed sanctions screening misses in the trailing 24 months.
        Q1-2026 testing of 200 sampled transactions found 100% screening at
        all three checkpoints. The 2025-Q4 independent audit issued one
        observation (vendor list update SLA, now closed). False-positive
        rate of 2.4% is within industry benchmark of 2–4%.
    open_issues: []
    addresses_root_causes:
      - "external.regulatory_or_legislative_change"
      - "process.design_failure"
      - "technology.inadequate_data_storage_retention_destruction"
    covers_risks: [R-PR16-04]

  - control_id: C-PR16-05
    name: "Payment platform availability monitoring and failover testing"
    control_type: "Surveillance"
    placement: "Detective"
    method: "Automated with manual component"
    description: >
      The WWP, CBP, SSE, and Fedwire/SWIFT interfaces are monitored 24x7 by
      the IT Operations Network Operations Center (NOC) with synthetic
      transactions every two minutes during the settlement window and every
      five minutes outside it. Tier-1 system availability is measured against
      a 99.95% intra-day SLO. Quarterly failover tests exercise the
      hot-standby payment platform; an annual full-disaster-recovery test
      validates end-to-end recovery to the alternate datacenter within the
      defined 60-minute recovery time objective (RTO).
    owner_role: "Manager, IT Operations — Payments Platform"
    accountable_executive: "Chief Technology Officer"
    frequency: "Continuous monitoring; quarterly failover; annual DR"
    automation_level: "Automated (monitoring); manual (failover test execution)"
    primary_systems: [SYS-WWP, SYS-CBP, SYS-SSE, SYS-FED, SYS-SWIFT]
    evidence_artifacts:
      - "Daily availability and SLO report (retained 3 years)"
      - "Quarterly failover test results"
      - "Annual DR test report with regulatory attestation package"
      - "Monthly capacity and performance trend report"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Monitoring design is aligned with FFIEC IT Examination Handbook and
        OCC operational resilience expectations. The 60-minute RTO is
        conservative for high-value payments. Quarterly failover frequency is
        higher than the industry minimum but lower than what the most resilient
        peers (semi-annual full DR) maintain.
    operating_assessment:
      rating: "Satisfactory"
      narrative: >
        Trailing-24-month availability for WWP is 99.97%, exceeding the SLO.
        2025 annual DR test met all RTO objectives. One Tier-1 incident
        (WWP partial outage of 23 minutes during a non-peak window in 2025-Q2)
        was below the 60-minute RTO and did not impact settlement. Q1-2026
        failover test surfaced a configuration drift in the standby SSE
        node (issue ISS-PR16-004, in remediation).
    open_issues:
      - issue_id: ISS-PR16-004
        title: "Standby SSE node configuration drift"
        severity: "Medium"
        target_close: "2026-Q2"
    addresses_root_causes:
      - "technology.inadequate_maintenance_or_capacity"
      - "technology.inadequate_change_release_deployment"
      - "external.natural_disaster_or_environmental_disruption"
    covers_risks: [R-PR16-05]

  - control_id: C-PR16-06
    name: "Daily nostro and suspense account reconciliation"
    control_type: "Reconciliation"
    placement: "Detective"
    method: "Automated with manual component"
    description: >
      Each business day by 10:00 AM ET on D+1, the Nostro Reconciliation Tool
      (NRT) automatically reconciles outbound and inbound payment activity
      across all nostro accounts, suspense accounts, and the General Ledger.
      Items that fail to match auto-route to the Reconciliation Operations
      Specialist for investigation. Items aging beyond 5 business days
      escalate to the Manager, Reconciliation; items aging beyond 15
      business days require a written variance memo and Controller sign-off.
    owner_role: "Reconciliation Operations Specialist"
    accountable_executive: "Controller"
    frequency: "Daily (auto-match); event-driven (investigation and escalation)"
    automation_level: "Hybrid (automated match; manual investigation)"
    primary_systems: [SYS-NRT, SYS-CBP, SYS-WWP]
    evidence_artifacts:
      - "Daily reconciliation report (retained 7 years per SOX recordkeeping)"
      - "Aged item tracking log"
      - "Monthly nostro balance attestation"
      - "Annual SOX 404 ITGC and process control testing"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Reconciliation design follows SOX 404 and FFIEC expectations. Three-
        way reconciliation (outbound payment record, settlement confirmation,
        GL posting) is the design standard. The aging-based escalation
        ladders are appropriate. One weakness: the NRT match algorithm uses
        amount-and-date matching that can miss timing-difference items
        without flagging them, requiring manual identification.
    operating_assessment:
      rating: "Satisfactory"
      narrative: >
        The 2025 SOX testing cycle found the control operating effectively
        with no exceptions. The trailing 12-month average aged item count
        (>5 business days) is 12 items, with quarterly cleanup keeping the
        balance below 30. One material variance ($1.4M) in 2024-Q4 was
        traced to a system clock skew between WWP and CBP after a clock-
        synchronization service failure (technology root cause).
    open_issues:
      - issue_id: ISS-PR16-005
        title: "NRT match algorithm does not flag timing-difference items"
        severity: "Low"
        target_close: "2027-Q1"
    addresses_root_causes:
      - "technology.inadequate_data_storage_retention_destruction"
      - "process.implementation_or_operating_failure"
      - "people.human_error"
    covers_risks: [R-PR16-06]

  - control_id: C-PR16-07
    name: "Privileged access recertification for payment workflow systems"
    control_type: "System and Application Restrictions"
    placement: "Preventive"
    method: "Manual with system support"
    description: >
      Privileged access roles in WWP, SSE, and IAM (specifically: WWP-Admin,
      WWP-OverrideApprover, SSE-RuleAuthor, SSE-Adjudicator, IAM-RoleManager)
      are recertified quarterly by the role owner and confirmed by the
      accountable executive. Access not affirmatively recertified is
      automatically suspended within five business days of the recertification
      cycle close. Emergency access (break-glass) is monitored in real time by
      Security Operations Center and reviewed weekly.
    owner_role: "IT Identity & Access Management Analyst"
    accountable_executive: "Chief Information Security Officer (CISO)"
    frequency: "Quarterly (recertification); weekly (break-glass review)"
    automation_level: "Hybrid (system-driven workflow; manual attestation)"
    primary_systems: [SYS-IAM, SYS-WWP, SYS-SSE]
    evidence_artifacts:
      - "Quarterly recertification campaign report (retained 7 years)"
      - "Break-glass access weekly review log"
      - "Privileged user inventory (refreshed daily)"
      - "Annual access management audit (Internal Audit)"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Quarterly cadence is consistent with NIST 800-53 AC-6 and FFIEC IAM
        guidance. Tying recertification suspension to non-action is a strong
        design choice — it shifts the default from over-permissioned to
        under-permissioned. Break-glass monitoring is an important compensating
        control. Design weakness: 90-day recertification window is long for
        the most sensitive override roles; some peers operate at 30 days.
    operating_assessment:
      rating: "Improvement Needed"
      narrative: >
        Q1-2026 recertification campaign closed with 92% on-time completion;
        target is 98%. Late completions concentrated in two business unit
        roles. Internal Audit's 2025 access management review found three
        instances where privileged access was retained beyond 30 days after
        a role change (issue ISS-PR16-006). The break-glass review is
        operating effectively.
    open_issues:
      - issue_id: ISS-PR16-006
        title: "Privileged access retained beyond 30 days post-role-change"
        severity: "High"
        target_close: "2026-Q2"
      - issue_id: ISS-PR16-007
        title: "Recertification window too long for highest-sensitivity override roles"
        severity: "Medium"
        target_close: "2026-Q4"
    addresses_root_causes:
      - "process.implementation_or_operating_failure"
      - "technology.inadequate_change_release_deployment"
      - "external.external_malicious_or_criminal_acts"
    covers_risks: [R-PR16-07, R-PR16-01]

  - control_id: C-PR16-08
    name: "Cross-training and rotation program for payment exception staff"
    control_type: "Talent Management Practices"
    placement: "Preventive"
    method: "Manual"
    description: >
      All Payment Exception Specialists rotate through each exception queue
      type (Sanctions Hold, Fraud Alert, Format Error, Beneficiary Mismatch,
      Compliance Hold, Insufficient Funds) on a documented 6-month cycle.
      Cross-training completion is tracked in the Learning Management System
      with role-based proficiency tests. The team maintains a documented
      coverage matrix ensuring at least three trained specialists are
      qualified for every queue type at all times.
    owner_role: "Manager, Wire Operations Quality Assurance"
    accountable_executive: "Head of Banking Operations"
    frequency: "Continuous (rotation cycle); annual (coverage matrix review)"
    automation_level: "Manual (LMS tracking; supervisor scheduling)"
    primary_systems: ["Learning Management System (LMS)", SYS-WWP]
    evidence_artifacts:
      - "Quarterly coverage matrix attestation"
      - "LMS proficiency completion records"
      - "Annual staffing and resourcing adequacy assessment"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Cross-training design addresses the structural risk of single-skill
        staff and key-person concentration that has historically driven
        capacity-related exception aging incidents at peer institutions.
        Three-deep coverage requirement is consistent with operational
        resilience expectations.
    operating_assessment:
      rating: "Improvement Needed"
      narrative: >
        2026-Q1 coverage matrix shows two queue types (Sanctions Hold and
        Fraud Alert) with only two qualified specialists rather than the
        required three, due to one departure and one extended leave. Issue
        ISS-PR16-008 was opened in 2026-Q1; remediation in progress with two
        additional specialists in advanced training. Rotation cycle compliance
        is at 78% against an 85% target.
    open_issues:
      - issue_id: ISS-PR16-008
        title: "Sanctions Hold and Fraud Alert queue coverage below 3-deep target"
        severity: "Medium"
        target_close: "2026-Q3"
    addresses_root_causes:
      - "people.inadequate_knowledge_skills_or_training"
      - "people.inadequate_workforce_management_resourcing"
    covers_risks: [R-PR16-02, R-PR16-08]

  - control_id: C-PR16-09
    name: "Real-time payment fraud rules engine with anomaly detection"
    control_type: "Automated Rules"
    placement: "Preventive"
    method: "Automated with manual component"
    description: >
      Every payment is scored in real time by the Real-Time Fraud Engine (RFE)
      against rule-based criteria (velocity, beneficiary novelty, amount
      anomaly, geographic risk, customer behavior baseline) and a supervised
      machine-learning model trained on historical fraud and BEC events.
      Scores above defined thresholds either suspend the payment for Fraud
      Investigations review (high score) or flag it for additional verification
      (medium score). Model retraining occurs quarterly with full validation
      per SR 11-7 model risk management standards.
    owner_role: "Fraud Investigations Manager"
    accountable_executive: "Chief Fraud Officer"
    frequency: "Continuous (per transaction); quarterly (model retraining)"
    automation_level: "Automated (scoring); manual (high-score adjudication)"
    primary_systems: [SYS-RFE, SYS-WWP]
    evidence_artifacts:
      - "Daily fraud scoring report"
      - "Suspended payment investigation log"
      - "Quarterly model performance and validation report"
      - "Annual independent model validation per SR 11-7"
    design_assessment:
      rating: "Strong"
      narrative: >
        Combined rule-based and ML scoring is the industry-leading design for
        BEC and external fraud detection. Quarterly retraining cadence
        prevents the most common fraud-detection failure mode (model drift).
        Tiered response (suspend vs. flag) balances customer experience
        against fraud prevention.
    operating_assessment:
      rating: "Strong"
      narrative: >
        Trailing-12-month fraud detection rate is 89% (industry benchmark
        ~75–82%) against confirmed external fraud attempts. False-positive
        rate is 0.6% — within tolerance. INC-2025-Q1-BEC-003 was caught by
        this control. The Q1-2026 model validation found one minor
        calibration observation, no material findings.
    open_issues: []
    addresses_root_causes:
      - "external.external_malicious_or_criminal_acts"
      - "external.client_conduct_or_error"
      - "people.internal_malicious_acts"
    covers_risks: [R-PR16-01, R-PR16-03, R-PR16-07]

  - control_id: C-PR16-10
    name: "Quarterly business continuity testing for payment operations"
    control_type: "Business Continuity Planning and Awareness"
    placement: "Contingency Planning"
    method: "Manual"
    description: >
      Each quarter, Banking Operations executes a business continuity exercise
      simulating one of: payment platform outage, alternate-site activation,
      cyber incident requiring system isolation, or pandemic-style workforce
      restriction. Exercises include real-time decision-making, communication
      protocols, and recovery activity documentation. After-action reviews
      identify gaps and feed into the BCP plan update cycle. Annual exercise
      includes Federal Reserve regulator observation.
    owner_role: "Business Continuity Manager"
    accountable_executive: "Head of Banking Operations"
    frequency: "Quarterly (exercise); annual (full-scale with regulator)"
    automation_level: "Manual"
    primary_systems: ["Business Continuity Planning System", SYS-WWP, SYS-CBP]
    evidence_artifacts:
      - "Quarterly BCP exercise after-action report"
      - "Annual regulator-observed exercise package"
      - "BCP plan update history"
      - "Workforce communication test logs"
    design_assessment:
      rating: "Satisfactory"
      narrative: >
        Quarterly exercise frequency exceeds OCC Heightened Standards minimum
        (annual). Scenario rotation covers the four threat archetypes. The
        Federal Reserve observation cycle provides external validation.
        Design is sound; operational depth could improve.
    operating_assessment:
      rating: "Satisfactory"
      narrative: >
        Q4-2025 exercise (cyber isolation scenario) identified two
        communication-protocol gaps now closed. Q1-2026 exercise (alternate
        site) ran successfully with all RTO objectives met. The annual
        Federal Reserve observation in 2025-Q3 issued zero findings.
    open_issues: []
    addresses_root_causes:
      - "external.natural_disaster_or_environmental_disruption"
      - "external.geopolitical_economic_or_social_instability"
      - "technology.inadequate_maintenance_or_capacity"
    covers_risks: [R-PR16-05]

# =============================================================================
# 4. RISKS — material risks for this process
# =============================================================================

risks:

  # ---------------------------------------------------------------------------
  # R-PR16-01 — Unauthorized release of high-value wire payment by an insider
  # ---------------------------------------------------------------------------
  - risk_id: R-PR16-01
    title: "Unauthorized release of high-value wire payment by an insider"
    taxonomy_node_id: RIB-IFR
    taxonomy_path: "Operational Risk > Internal Fraud / Internal Misconduct"
    risk_owner: "Head of Wire Operations"
    risk_owner_role_id: ROLE-WIRE-OPS-HEAD
    second_line_owner: "Operational Risk Officer — Banking Operations"
    description: >
      A current or former employee with payment-system access — acting alone or
      in collusion — releases an unauthorized high-value wire by (a) exploiting
      a privileged override path, (b) circumventing dual-approval through a
      workflow weakness or coverage gap, or (c) coordinating with an internal
      accomplice acting as second approver. The economic exposure is acute
      because single-payment values routinely exceed $50M, Fedwire and CHIPS
      settlement is finality-binding within minutes of release, and historical
      recovery rates on insider fraud in payments at peer institutions in the
      ABA / ORX consortium dataset (2019–2024) sit below 18 percent of net
      exposure.

    risk_event: >
      Unauthorized release of one or more high-value wire payments by an
      insider, with funds exiting the institution before detection or recall.

    causes:
      - cause_id: people.internal_malicious_acts
        category: People
        classification: primary
        rationale: >
          The defining act is deliberate misappropriation by a person of trust
          with system access. The remaining causes describe the conditions
          that make the act possible or undetected; the act itself is the
          primary cause.
      - cause_id: process.design_failure
        category: Process
        classification: contributing
        rationale: >
          Where the maker-checker workflow permits the same user to act in
          both originator and approver roles for an exception repair (for
          example, by reassigning a queue item to themselves after rejection),
          design weakness creates the opportunity. The institution has closed
          the explicit single-user path but residual pathway risk remains
          where temporary coverage assignments are used during incidents.
      - cause_id: technology.inadequate_system_design_or_development
        category: Technology
        classification: contributing
        rationale: >
          A privilege model that grants a single high-trust account both
          repair and release authority, or that tolerates break-glass
          escalation without independent oversight, materially raises
          residual likelihood. SYS-WWP enforces SoD at the platform layer,
          but break-glass procedures have known logging-completeness gaps
          (ISS-PR16-006).
      - cause_id: people.cultural_or_conduct_weakness
        category: People
        classification: contributing
        rationale: >
          A culture that rewards queue-clearing throughput over careful
          procedural adherence — or that informally tolerates "favor swaps"
          between approvers under time pressure — increases the likelihood
          that a determined insider can engineer an authorization chain.

    consequences:
      financial:
        - "Direct misappropriation loss at the face value of unauthorized payment(s); historical peer-recovery rates below 18 percent of net exposure (ABA / ORX 2019–2024)."
        - "Insurance recovery is partial and time-bound: the financial-institution bond / crime policy carries a $25M sub-limit per insider event with $5M deductible."
      regulatory:
        - "Suspicious Activity Report (SAR) filing within 30 days of detection; 90 days if subject identification is incomplete."
        - "Likely MRA from OCC continuous monitoring team if the event reflects a control failure rather than a one-off circumvention."
        - "Potential Federal Reserve enforcement under the Heightened Standards framework if the failure is systemic."
        - "FinCEN reporting and possible coordination with law enforcement (FBI, USSS)."
      reputational:
        - "Insider-fraud headlines are durably damaging to commercial-banking franchise; peer events have produced multi-quarter deposit-flow consequences."
        - "Rating agencies cite operational-risk controls explicitly in mid-tier bank surveillance; downgrade risk on material event."
      customer:
        - "Originating customer's funds are misappropriated; recovery uncertain and contractually contested."
        - "Counterparty banks may suspend correspondent privileges pending investigation."
      legal_litigation:
        - "Civil claims from originating customer and any harmed counterparties."
        - "Potential D&O exposure if board-level controls oversight is questioned."
      operational:
        - "Mandatory operational standdown of the impacted workflow during forensic review; cascade impact on wire-cutoff capacity."

    affected_stakeholders:
      - "Originating customer (commercial or retail account holder)"
      - "Beneficiary bank and any onward correspondent parties"
      - "Federal Reserve Bank operating Fedwire / CHIPS"
      - "OCC, Federal Reserve Board (Operational Risk supervision)"
      - "FinCEN (SAR consumer)"
      - "Board of Directors and Audit Committee"
      - "Shareholders and rating agencies"
      - "Financial-institution bond carrier"

    inherent_assessment:
      impact_dimensions:
        financial:
          score: 4
          rationale: >
            A single unauthorized wire ≥ $50M is plausible given normal
            transaction profiles. Multi-payment scenarios could drive net
            exposure into $100M+ before detection given the daily $87B
            volume. Insurance recovery is materially capped.
        regulatory:
          score: 4
          rationale: >
            SAR filing is automatic; an MRA is highly likely if pattern
            suggests control failure. A material insider event has historical
            precedent of producing formal enforcement actions at peers.
        reputational:
          score: 4
          rationale: >
            Insider fraud in payments commands media attention and produces
            durable franchise damage. Peer events show 4–8 quarter recovery
            arc for affected commercial deposit relationships.
        customer:
          score: 3
          rationale: >
            Direct customer impact is acute but bounded to the originating
            party and immediate counterparties. Broader retail base less
            exposed.
        liquidity:
          score: 2
          rationale: >
            Institution capacity absorbs realistic single-event loss without
            liquidity stress; longer recovery arcs may pressure deposit
            franchise but liquidity buffer remains adequate.
      aggregate_impact_score: 4
      aggregate_impact_method: "Maximum across dimensions (conservative)"
      aggregate_impact_band: "Major"
      likelihood_score: 3
      likelihood_band: "Likely"
      likelihood_rationale: >
        Without compensating controls, peer experience indicates insider
        fraud attempts in payments operations are persistent — ABA / ORX
        consortium data shows 0.6 attempted events per $100B annual payment
        volume across reporting peers (2019–2024). A "Likely" inherent
        likelihood reflects this base rate before institution-specific
        controls are applied.
      inherent_rating:
        score: 12
        band: "High"
        derivation: >
          Maximum impact dimension (4 — Major) × likelihood (3 — Likely) = 12.
          Per inherent_risk_matrix.yaml, scores 12-15 fall in the High band.
          High inherent rating is consistent with peer benchmarking that
          treats insider payment fraud as a top-quartile op-risk concern.

    control_mapping:
      - control_id: C-PR16-01
        coverage_role: primary_preventive
        coverage_strength: strong
        addresses_root_causes:
          - process.design_failure
          - people.internal_malicious_acts
        rationale: >
          Platform-enforced dual approval for wires ≥ $1M directly counters
          the primary cause path (deliberate release) and the design path
          (single-user authorization). Strength is "strong" because
          enforcement is at the platform layer (SYS-WWP), not procedural —
          the approver field is workflow-bound and cannot be the originator.
      - control_id: C-PR16-07
        coverage_role: secondary_preventive
        coverage_strength: strong
        addresses_root_causes:
          - technology.inadequate_system_design_or_development
        rationale: >
          Quarterly privileged-access recertification removes accumulated
          access — a meaningful insider-fraud vector at peers — and
          constrains the population of users who could exploit override
          paths.
      - control_id: C-PR16-03
        coverage_role: tertiary_preventive
        coverage_strength: moderate
        addresses_root_causes:
          - people.internal_malicious_acts
        rationale: >
          Out-of-band beneficiary callback intercepts insider-fraud variants
          where the insider has substituted beneficiary details on a
          legitimate payment. Moderate strength because callback is
          triggered by detail-change rules, not by every release.
      - control_id: C-PR16-09
        coverage_role: detective
        coverage_strength: moderate
        addresses_root_causes:
          - people.internal_malicious_acts
        rationale: >
          Real-time fraud rules engine flags anomalous release patterns —
          unusual beneficiary, off-hours activity, atypical amount-for-user.
          Detective rather than preventive; success depends on attacker
          deviating from normal patterns.

    control_environment:
      overall_rating: "Strong"
      design_summary: >
        The control stack is well-designed for the primary cause path.
        Dual-approval is enforced at the platform layer rather than via
        procedure, and the SoD model excludes the originator from the
        approver pool by ID, not just by name. Privileged-access governance
        is workflow-driven with automated revocation. The detective layer
        (fraud rules engine) provides independent assurance. Design gaps
        are limited to break-glass logging completeness (ISS-PR16-006).
      operating_summary: >
        Q1-2026 sample testing of 1,247 transactions ≥ $1M showed zero
        SoD violations and zero approver-originator collisions. Privileged
        access recertification completion was 95.5% (target 100%; 11 of
        247 users not recertified within 90-day window — ISS-PR16-007 open).
        No internal-fraud anomaly flags converted to confirmed events in
        trailing 12 months.
      open_issues:
        - issue_id: ISS-PR16-006
          summary: "Privileged access not removed timely after role change for 2 staff during Q1"
          status: "Closed (2026-03-12)"
          severity: "Medium"
        - issue_id: ISS-PR16-007
          summary: "Quarterly recertification window slipped 9 times in Q1; 7 of 9 closed within 30 days, 2 in remediation"
          status: "Open — In remediation"
          severity: "Medium"

    residual_assessment:
      impact_dimensions:
        financial: 4
        regulatory: 4
        reputational: 4
        customer: 3
        liquidity: 2
      aggregate_impact_score: 4
      likelihood_score: 1
      likelihood_band: "Rare"
      likelihood_rationale: >
        Strong platform-enforced SoD, active PAM with quarterly
        recertification, and detective fraud-rules layer reduce residual
        likelihood from peer base rate to "Rare". Trailing 24-month internal
        fraud event count is zero. Re-score is committed if peer benchmark
        study (AP-PR16-01-M1) indicates upward shift in industry frequency.
      residual_rating:
        score: 4
        band: "Medium-Low"
        derivation: >
          Aggregate impact (4 — Major) × residual likelihood (1 — Rare) = 4.
          Per residual_risk_matrix.yaml, scores 4-7 fall in the
          Medium-Low band. Note: management response rules elevate appetite
          status to "Within with conditions" when residual likelihood relies
          on a single dominant control (here: dual-approval at C-PR16-01).
      appetite_status: "Within"
      appetite_status_rationale: >
        Residual Medium-Low aligns with the institution's qualitative
        appetite of "Zero tolerance for confirmed events; controls must
        sustain Rare residual likelihood." Quantitative threshold
        APP-FRAUD-INT-01 (zero confirmed insider-fraud events in payments
        per rolling 12 months) is currently met with 24-month clean record.
      management_response: "Monitor and Sustain"
      management_response_rationale: >
        Per management_response_rules.yaml, residual within appetite with
        clean trailing record warrants "Monitor and Sustain" rather than
        active reduction. However, the open recertification slippage
        (ISS-PR16-007) and the cultural sensitivities of insider risk
        warrant continued investment in detective assurance and periodic
        unannounced testing.

    exposure_metrics:
      - metric_id: KRI-PR16-01-A
        name: "Segregation-of-Duties Violations on Payment Workflow"
        type: "Spot"
        unit: "count per quarter"
        definition: >
          Count of dual-approval bypass events (originator and approver are
          the same user, or approver is below required grade) detected by
          SYS-WWP audit log in a calendar quarter.
        current_value: "0"
        thresholds:
          green: "0"
          amber: "1"
          red: "≥ 2"
        frequency: "Continuous detection; monthly summary; quarterly trending"
        owner: "Head of Wire Operations"
        data_source: "SYS-WWP audit log"
        escalation: >
          Any Amber: immediate notification to Operational Risk Officer and
          Head of Banking Operations within 4 hours; Red: same-day
          escalation to Operational Risk Committee with concurrent SAR
          review trigger.
      - metric_id: KRI-PR16-01-B
        name: "Privileged Access Recertification Compliance"
        type: "Spot"
        unit: "percent of population not recertified within window"
        definition: >
          Number of payment-system privileged users not recertified within
          the 90-day window, divided by total privileged user population.
        current_value: "4.5% (11 of 247 users)"
        thresholds:
          green: "≤ 2.0%"
          amber: "2.1% – 5.0%"
          red: "> 5.0%"
        frequency: "Monthly snapshot; quarterly trending"
        owner: "IAM Lead"
        data_source: "SYS-IAM recertification module"
        escalation: >
          Amber sustained 2 consecutive months: Operational Risk Officer;
          Red: ORC at next meeting with remediation plan.
      - metric_id: KRI-PR16-01-C
        name: "Privileged Override / Break-Glass Use"
        type: "Spot"
        unit: "count per month"
        definition: >
          Count of privileged-override or break-glass authorizations used
          in payment workflow systems (SYS-WWP, SYS-CBP, SYS-IAM) per month.
          Each use requires post-event independent review.
        current_value: "3 (trailing month, all reviewed and disposed within 5 business days)"
        thresholds:
          green: "≤ 5 / month"
          amber: "6 – 10 / month"
          red: "> 10 / month"
        frequency: "Daily detection; weekly summary; monthly review"
        owner: "Head of Banking Operations IT"
        data_source: "SYS-IAM and SYS-WWP audit logs"
        escalation: >
          Amber: Operational Risk Officer review of each event; Red:
          ORC with concurrent independent review by Internal Audit.
      - metric_id: KRI-PR16-01-D
        name: "Trailing 12-Month Confirmed Internal Fraud Loss in Payments"
        type: "Spot"
        unit: "USD"
        definition: >
          Sum of confirmed internal-fraud losses attributable to payment
          operations over trailing 12 months, gross of recovery.
        current_value: "$0"
        thresholds:
          green: "$0"
          amber: "$1 – $50,000"
          red: "> $50,000"
        frequency: "Monthly reporting; immediate on confirmed event"
        owner: "Operational Risk Loss Database Lead"
        data_source: "ORM event database (SYS-ORM)"
        escalation: >
          Any non-zero: ORC notification within 5 business days; loss
          exceeds $250K: Audit Committee notification at next meeting.
      - metric_id: KRI-PR16-01-E
        name: "Fraud Rules Engine Internal-Actor Anomaly Flags"
        type: "Forward"
        unit: "count per quarter"
        definition: >
          Count of fraud-rules-engine anomaly alerts where the actor is
          identified as an internal user, including false positives.
        current_value: "2 (Q1 2026: one staff training event, one false positive)"
        thresholds:

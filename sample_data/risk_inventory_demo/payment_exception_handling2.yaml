#   - Inherent mtx  : config/risk_inventory/inherent_risk_matrix.yaml
#   - Residual mtx  : config/risk_inventory/residual_risk_matrix.yaml
#   - Mgmt response : config/risk_inventory/management_response_rules.yaml

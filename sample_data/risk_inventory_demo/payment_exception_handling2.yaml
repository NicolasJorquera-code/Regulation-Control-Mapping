      reviewer_role: "Group Chief Risk Officer"
      review_forum: "Operational Risk Committee — extraordinary session"
      review_date: "2026-04-29"
      challenge_summary: >
        Reviewer challenged the Risk Owner directly on three points:
        (1) whether the proposed Q4-2026 return-to-appetite timeline is

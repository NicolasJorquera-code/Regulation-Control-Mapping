  # ---------------------------------------------------------------------------
  # R-PR16-02 — Aging exception backlog leads to missed customer cutoffs
  # ---------------------------------------------------------------------------
  # NOTE: This is the binding active risk for the process — currently outside
  # appetite. It is the headline message of the executive summary.
  # ---------------------------------------------------------------------------
  - risk_id: R-PR16-02
    title: "Aging payment-exception backlog breaches customer cutoffs and accumulates remediation cost"
    taxonomy_node_id: RIB-BPR
    taxonomy_path: "Operational Risk > Business Process Risk"
    risk_owner: "Senior Manager — Exception Repair"
    risk_owner_role_id: ROLE-EXCEPTION-MGR
    second_line_owner: "Operational Risk Officer — Banking Operations"
    description: >
      Backlog of unresolved payment exceptions exceeds repair capacity,
      causing payments to miss originator cutoffs (Fedwire 6:30 PM ET, CHIPS
      5:00 PM ET, ACH next-day) and breach customer service-level
      commitments. Material customer harm occurs when business-critical
      payments (payroll, vendor settlement, tax payments, real-estate
      closings) settle late, requiring institution-funded remediation. The
      condition has been observed and is currently outside the institution's
      operational-resilience appetite. Trailing 12-month customer remediation
      payments total $1.4M against an annual appetite limit of $750K.

    risk_event: >
      Repeated customer-cutoff breaches across one or more payment channels
      driven by aging exceptions in the repair queue, with cumulative customer
      remediation, regulatory complaint volume, or reputational exposure
      breaching defined appetite thresholds.

    causes:
      - cause_id: people.inadequate_workforce_management_resourcing
        category: People
        classification: primary
        rationale: >
          Capacity in the Exception Repair function (currently 25 FTE across
          two shifts) is dimensioned to median exception volume (≈198/day)
          but has insufficient surge headroom for the P95 day (≈340
          exceptions). 18% voluntary attrition in trailing 12 months has
          left 4 senior-grade roles open for an average of 67 days. This is
          the dominant driver of the binding condition.
      - cause_id: process.implementation_or_operating_failure
        category: Process
        classification: contributing
        rationale: >
          Escalation thresholds in the aging dashboard (C-PR16-02) are
          documented but inconsistently applied — Q1-2026 sample testing
          showed 11 of 47 aging-amber items not escalated within the
          required 4-hour window (ISS-PR16-002), indicating implementation
          drift.
      - cause_id: external.client_conduct_or_error
        category: External
        classification: contributing
        rationale: >
          Approximately 38% of exceptions originate from upstream customer
          input quality (malformed beneficiary data, missing reference,
          stale account information). The institution has limited ability
          to control inbound quality; mitigations focus on early customer
          feedback loops and automated pre-validation at host-to-host
          channels.
      - cause_id: process.lack_of_clarity_or_ownership
        category: Process
        classification: contributing
        rationale: >
          For exception types touching multiple functions (e.g., a sanctions
          hold that requires Compliance disposition before Operations can
          repair), ownership of the aging clock is unclear and has been
          observed to "pause" inappropriately, masking true age.

    consequences:
      financial:
        - "Customer remediation payments — direct reimbursement for late-payment penalties, NSF fees, lost discount terms, and contractual late fees borne by the originator. Trailing 12-month total: $1.4M against $750K appetite."
        - "Operational rework cost: each escalated breach requires Manager review, customer communication, root-cause documentation. Estimated internal cost ≈ $4,200 per breach event."
      regulatory:
        - "Regulator complaint volume: trailing 12-month CFPB complaint count attributable to payment-cutoff failures was 14, up from 6 in prior year — visible in OCC continuous monitoring."
        - "Risk of MRA from OCC if pattern persists or if a single high-profile breach event reaches enforcement-relevance threshold."
        - "Possible CFPB inquiry on commercial-customer treatment if breach pattern shows demographic skew."
      reputational:
        - "Commercial customer franchise damage: 2 commercial banking RFPs cited 'payment reliability' as a discriminator in Q1-2026 — direct attribution to backlog narrative."
        - "Industry analyst surveillance: pattern visible in third-party operational-risk benchmarking (e.g., Aite, Celent)."
      customer:
        - "Direct customer harm — missed payroll, missed tax filings, lost contract discounts, supplier relationship damage. Q1-2026 saw 3 instances of customer-imposed wire-handling restrictions ('originate via competitor bank for time-sensitive items')."
      operational:
        - "Compounding effect — overflow into next-day queue further constrains capacity and increases probability of recurring breach (positive-feedback loop observed in February 2026)."

    affected_stakeholders:
      - "Originating commercial customers (especially those with same-day settlement requirements)"
      - "Beneficiary parties (vendors, employees, counterparties of customers)"
      - "Payment Operations staff (workload and morale impact)"
      - "Customer Experience and Complaints function (downstream complaint handling)"
      - "OCC continuous monitoring team and CFPB"
      - "Operational Risk Committee and Audit Committee"

    inherent_assessment:
      impact_dimensions:
        financial:
          score: 3
          rationale: >
            Cumulative remediation, rework, and franchise-loss cost is
            material at the segment level (>$1M annually under elevated
            condition) but does not threaten enterprise capital. Bounded
            because per-event customer harm rarely exceeds $50K direct
            reimbursement.
        regulatory:
          score: 3
          rationale: >
            Pattern is visible to regulators but does not constitute a
            standalone enforcement risk unless prolonged. CFPB / OCC
            attention is "moderate concern" rather than "imminent action."
          score_explanation: "Moderate"
        reputational:
          score: 3
          rationale: >
            Direct customer-cited reputational impact in commercial RFPs is
            real and durable but franchise-bounded. Not headline-news scale
            unless coupled with a high-profile event.
        customer:
          score: 4
          rationale: >
            Multiple, repeated, durable customer harm events with clear
            attribution to the institution's process. Customer harm
            dimension drives the aggregate impact rating.
        liquidity:
          score: 1
          rationale: "Negligible direct liquidity consequence."
      aggregate_impact_score: 4
      aggregate_impact_method: "Maximum across dimensions (driven by Customer)"
      aggregate_impact_band: "Major"
      likelihood_score: 3
      likelihood_band: "Likely"
      likelihood_rationale: >
        Without controls (capacity surge, dashboard, escalation), exception
        backlog forms whenever inbound exception volume exceeds capacity
        even briefly. Industry data shows 60-70% of mid-size banks
        experience at least one quarterly cutoff-breach incident in
        normal operating conditions.
      inherent_rating:
        score: 12
        band: "High"
        derivation: >
          Maximum impact (4 — Major, Customer dimension) × likelihood (3 —
          Likely) = 12. Per inherent_risk_matrix.yaml, score 12 is the
          lower bound of the High band.

    control_mapping:
      - control_id: C-PR16-02
        coverage_role: primary_detective_corrective
        coverage_strength: moderate
        addresses_root_causes:
          - process.implementation_or_operating_failure
          - process.lack_of_clarity_or_ownership
        rationale: >
          The exception aging dashboard with SLA-based escalation is the
          designed primary mitigation. Strength is "moderate" (not strong)
          because the design has known gaps (incomplete escalation
          distribution, ISS-PR16-002; no urgency tiering by customer type,
          ISS-PR16-003) and operating performance has shown drift (11
          missed escalations in Q1 sample).
      - control_id: C-PR16-08
        coverage_role: secondary_preventive
        coverage_strength: moderate
        addresses_root_causes:
          - people.inadequate_workforce_management_resourcing
        rationale: >
          Cross-training and rotation expands the population of staff who
          can clear different exception types, reducing concentration risk
          during peak periods. Currently at 60% certification coverage
          versus 80% target — partial mitigation.
      - control_id: C-PR16-10
        coverage_role: tertiary_preventive
        coverage_strength: moderate
        addresses_root_causes:
          - people.inadequate_workforce_management_resourcing
        rationale: >
          Quarterly business-continuity testing exercises surge-capacity
          arrangements (off-shift call-in, contractor activation) which
          materially reduce sustained backlog risk. Indirect mitigation —
          tested but seldom invoked.

    control_environment:
      overall_rating: "Needs Improvement"
      design_summary: >
        The control stack is conceptually adequate but the primary
        detective-corrective control (C-PR16-02) carries two open design
        issues that materially weaken its coverage. The talent-management
        control (C-PR16-08) is below target coverage. The control
        environment relies on a workforce-resourcing assumption (median
        capacity sufficient for median load) that has been invalidated by
        observed P95 demand and elevated voluntary attrition.
      operating_summary: >
        Q1-2026 sample testing showed material operating drift: 11 of 47
        aging-amber items not escalated within 4 hours; 3 confirmed cutoff
        breaches in February driven by single-day backlog; cumulative
        trailing-12-month customer remediation $1.4M against $750K
        appetite. The condition is observed, persistent, and trending
        sideways rather than improving.
      open_issues:
        - issue_id: ISS-PR16-002
          summary: "Escalation distribution list incomplete — 4 of 12 routing rules omit second-line risk officer"
          status: "Open — In remediation, Q2 close target"
          severity: "Medium"
        - issue_id: ISS-PR16-003
          summary: "Aging dashboard does not differentiate urgency by customer cutoff type (commercial real-estate closing vs. routine vendor)"
          status: "Open — Design phase, Q3 close target"
          severity: "High"
        - issue_id: ISS-PR16-008
          summary: "Cross-training coverage at 60%, target 80%; 5 of 13 exception types have <3 trained operators"
          status: "Open — In progress, Q3 close target"
          severity: "Medium"

    residual_assessment:
      impact_dimensions:
        financial: 3
        regulatory: 3
        reputational: 3
        customer: 4
        liquidity: 1
      aggregate_impact_score: 4
      likelihood_score: 3
      likelihood_band: "Likely"
      likelihood_rationale: >
        Despite the control stack, observed Q1-2026 condition shows
        3 confirmed cutoff breaches and 11 missed escalations. Residual
        likelihood of "Likely" reflects the persistence of the underlying
        capacity-vs-demand mismatch and known control design gaps. This
        will not move below "Likely" until the open issues close and
        cross-training reaches the 80% target.
      residual_rating:
        score: 12
        band: "High"
        derivation: >
          Aggregate impact (4) × residual likelihood (3) = 12. Per
          residual_risk_matrix.yaml, score 12 is at the lower bound of
          the High band. This is the highest residual rating in the
          PR-16 portfolio and the binding active risk.
      appetite_status: "Outside Appetite"
      appetite_status_rationale: >
        Residual High rating breaches the qualitative appetite "Material
        operational risks should sit at Medium-Low or below following
        application of designed controls." Quantitative threshold
        APP-OPSRES-PAY-02 ($750K annual customer remediation cap) is
        exceeded by $650K trailing 12 months. Both qualitative and
        quantitative thresholds are breached — clear "Outside Appetite"
        status.
      management_response: "Reduce — Active Remediation"
      management_response_rationale: >
        Per management_response_rules.yaml, residual outside appetite with
        observed pattern requires "Reduce" response with active
        remediation plan reported monthly to ORC. Risk Owner is accountable
        for execution; Operational Risk Officer is accountable for
        independent challenge of remediation effectiveness.

    exposure_metrics:
      - metric_id: KRI-PR16-02-A
        name: "Customer Cutoff Breaches"
        type: "Spot"
        unit: "count per month"
        definition: >
          Count of payments that missed the originator's cutoff

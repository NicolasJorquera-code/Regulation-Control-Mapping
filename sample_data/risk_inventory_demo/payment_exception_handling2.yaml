  # ---------------------------------------------------------------------------
  # R-PR16-04 — OFAC / sanctions screening miss on a repaired payment
  # ---------------------------------------------------------------------------
  - risk_id: R-PR16-04
    title: "Sanctions-screening miss on a repaired payment results in OFAC violation"
    taxonomy_node_id: RIB-COM
    taxonomy_path: "Regulatory Compliance Risk > Sanctions / OFAC"
    risk_owner: "BSA / AML Officer"
    risk_owner_role_id: ROLE-BSA-AML-OFFICER
    second_line_owner: "Chief Compliance Officer"
    description: >
      A payment held for sanctions review is repaired by Operations and
      released without re-screening, OR the screening engine misses a
      sanctions hit on the post-repair payment string. Either path results
      in funds transferred to or for the benefit of an OFAC-listed person
      or jurisdiction in violation of US economic sanctions, exposing the
      institution to civil monetary penalties (currently up to $355K per
      violation under the Federal Civil Penalties Inflation Adjustment
      Act), criminal liability where willful, and significant reputational
      harm. The risk is acute because Operations repairs frequently change
      precisely the fields the screening engine evaluates (beneficiary
      name, address, bank identifier).

    risk_event: >
      Release and settlement of a payment that, post-repair, contains a
      sanctioned party or sanctioned jurisdiction reference, without
      having been intercepted by the sanctions screening engine.

    causes:
      - cause_id: process.implementation_or_operating_failure
        category: Process
        classification: primary
        rationale: >
          The dominant failure mode is the "rerun screening on repair"
          procedural step being skipped or not enforced — Operations
          repairs the payment, the post-repair version goes directly to
          release rather than back through the screening engine. Industry
          OFAC enforcement actions consistently cite this as the leading
          root cause in payment-screening failures.
      - cause_id: technology.inadequate_change_release_deployment
        category: Technology
        classification: contributing
        rationale: >
          The standby sanctions screening engine (SSE-2) has shown periodic
          drift in OFAC-list refresh timing — observed 47-minute lag in
          February 2026 (ISS-PR16-004) following a list-update push. List
          drift of even minutes can result in a missed hit.
      - cause_id: people.human_error
        category: People
        classification: contributing
        rationale: >
          Operator errors during repair — for example, retaining a partial
          beneficiary name string that fails fuzzy-match thresholds
          post-repair — can generate false negatives in screening.
      - cause_id: external.regulatory_or_legislative_change
        category: External
        classification: contributing
        rationale: >
          OFAC list updates are frequent and unpredictable; the SDN list
          and sectoral sanctions identifications can update multiple times
          per business day during geopolitical events. Speed-of-list-
          ingestion is a sustained operational challenge.

    consequences:
      financial:
        - "Civil monetary penalty per violation: up to $355,430 in 2026 per OFAC's annual inflation adjustment, or twice the value of the underlying transaction, whichever is greater."
        - "Potential criminal exposure where violation is willful: up to $1M per count plus up to 20 years imprisonment for individuals."
        - "Disgorgement of any benefit retained from the prohibited transaction."
      regulatory:
        - "OFAC enforcement action with mandatory remediation undertakings and potential public Settlement Agreement."
        - "Federal Reserve / OCC Matters Requiring Attention (MRA) on BSA/sanctions compliance program."
        - "Reporting obligations to OFAC: Apparent Violations within reasonable time of discovery (typically within 30 days where required by self-disclosure expectations under the OFAC Enforcement Guidelines)."
      reputational:
        - "Public OFAC settlement is published and indexed; effect on franchise is durable and frequently cited in subsequent regulatory examination."
        - "Counterparty due-diligence consequences: respondent banks may demand enhanced screening attestations."
      legal_litigation:
        - "Potential follow-on litigation from harmed parties under various civil-recovery theories."
      operational:
        - "Mandatory program-wide remediation with regulator oversight; consultant engagement common; multi-year cost in $M-low-tens."

    affected_stakeholders:
      - "OFAC (US Treasury Department)"
      - "Federal Reserve, OCC (BSA / sanctions supervision)"
      - "FinCEN"
      - "Originating customer (potential aiding-and-abetting concerns)"
      - "Counterparty banks"
      - "Board of Directors and Audit Committee"
      - "External counsel and any monitor appointed under enforcement"

    inherent_assessment:
      impact_dimensions:
        financial:
          score: 4
          rationale: >
            Per-violation penalties, multiplied by potential transaction
            value, plus mandatory remediation cost, can drive single-
            event total exposure into $10M+. Pattern-of-violation
            settlements at peers have reached $50M-$100M.
        regulatory:
          score: 4
          rationale: >
            Sanctions enforcement is a top-tier regulatory priority;
            consequences reach formal enforcement, potential CDO-style
            mandates, and personal accountability for senior officers
            under Heightened Standards.
        reputational:
          score: 4
          rationale: >
            Public OFAC settlement is indexable, citable, and durably
            damaging. Industry coverage is intense and persistent.
        customer:
          score: 2
          rationale: >
            Direct customer harm is bounded — the originating customer's
            transaction is blocked or unwound; secondary effects are
            relationship-based rather than financial.
        liquidity:
          score: 1
          rationale: "Negligible direct liquidity consequence."
      aggregate_impact_score: 4
      aggregate_impact_method: "Maximum across dimensions"
      aggregate_impact_band: "Major"
      likelihood_score: 3
      likelihood_band: "Likely"
      likelihood_rationale: >
        Without screening controls, OFAC violations would occur regularly
        given the volume of cross-border payments (~3,200 daily SWIFT
        outbound) and the frequency of OFAC list updates. Industry
        statistics suggest OFAC hit-rate is approximately 0.04% of
        cross-border payments — at the institution's volume, this implies
        ~3 hits per business day requiring intervention.
      inherent_rating:
        score: 12
        band: "High"
        derivation: >
          Aggregate impact (4 — Major) × likelihood (3 — Likely) = 12.
          Sanctions risk is a top-quartile regulatory-compliance concern
          for any institution conducting cross-border payments.

    control_mapping:
      - control_id: C-PR16-04
        coverage_role: primary_preventive
        coverage_strength: strong
        addresses_root_causes:
          - process.implementation_or_operating_failure
          - external.regulatory_or_legislative_change
        rationale: >
          Real-time sanctions screening at payment release with dual-engine
          architecture (primary SSE-1, standby SSE-2) and vendor-supplied
          OFAC list refresh is the FFIEC-aligned best-practice control.
          Strong by design — automated, gate-level, list-refresh-managed.
          One open issue (ISS-PR16-004 standby engine list-refresh drift)
          partially constrains "Strong" rating but compensating control
          via primary-engine independence sustains effectiveness.
      - control_id: C-PR16-06
        coverage_role: detective
        coverage_strength: moderate
        addresses_root_causes:
          - process.implementation_or_operating_failure
        rationale: >
          Daily nostro reconciliation provides backstop visibility — a
          payment to a sanctioned beneficiary that cleared screening would
          be visible in reconciliation outputs and could be detected via
          downstream review even if released. Detective rather than
          preventive, but provides defense-in-depth.

    control_environment:
      overall_rating: "Strong"
      design_summary: >
        The dual-engine architecture with vendor-provided OFAC list and
        independent list-refresh validation is industry-leading design.
        The "rerun on repair" procedural step is enforced via SYS-WWP
        workflow (a repaired payment cannot be released without traversal
        of the screening node). Design closes the dominant failure modes
        identified in peer enforcement actions.
      operating_summary: >
        Q1-2026 operating performance was strong: 100% of cross-border
        payments traversed screening; 14,200 hits generated; 14,193
        cleared after L1 review (false positives or whitelist matches);
        7 escalated to L2 BSA/AML review; 2 generated blocked-transaction
        reports filed with OFAC. Zero sanctions violations identified in
        trailing 24 months. One open issue: ISS-PR16-004 standby engine
        list-refresh drift (47-min lag observed Feb 2026).
      open_issues:
        - issue_id: ISS-PR16-004
          summary: "Standby sanctions screening engine (SSE-2) shows periodic OFAC list-refresh drift up to 47 minutes following list-update events"
          status: "Open — Vendor patch pending, Q2 close target"
          severity: "Medium"

    residual_assessment:
      impact_dimensions:
        financial: 4
        regulatory: 4
        reputational: 4
        customer: 2
        liquidity: 1
      aggregate_impact_score: 4
      likelihood_score: 1
      likelihood_band: "Rare"
      likelihood_rationale: >
        Strong dual-engine screening with workflow-enforced "rerun on
        repair", combined with detective layer via reconciliation, drives
        residual likelihood to "Rare". Zero confirmed violations in
        trailing 24 months, against ~3 daily hits processed. Residual is
        not "Improbable" because the open list-refresh drift issue
        creates a narrow but real window of exposure.
      residual_rating:
        score: 4
        band: "Medium-Low"
        derivation: >
          Aggregate impact (4 — Major) × residual likelihood (1 — Rare)
          = 4. Score 4 = lower bound of Medium-Low. Note: per
          management_response_rules.yaml, qualitative zero-tolerance
          appetite for sanctions violations supersedes the numeric band
          and elevates appetite status to "Within with conditions".
      appetite_status: "Within with conditions"
      appetite_status_rationale: >

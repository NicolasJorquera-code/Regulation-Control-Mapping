version: "1.2.0"
risk_appetite_framework:
  statement: "The bank maintains zero tolerance for material BSA/AML control failures, customer data exposure, or unauthorized account openings. Residual risk above Medium in Compliance, Cyber, or Privacy categories requires CRO escalation within 5 business days."
  effective_date: "2026-01-01"
  approver: "Board Risk Committee"
  category_thresholds:
    compliance: "Low"
    cyber: "Low"
    privacy: "Low"
    operational: "Medium"
    third_party: "Medium"
  escalation_rules:
    - "Residual at threshold: monthly monitoring by 1LOD with quarterly 2LOD review."
    - "Residual above threshold: executive-approved remediation plan with quarterly progress review."
    - "Compliance / Cyber / Privacy residual two or more bands above threshold: Board Risk Committee escalation within 10 business days."
scenario:
  run_id: "DEMO-RI-CUSTONB-001"
  tenant_id: "demo-bank"
  process_id: "PROC-CUST-ONBOARD"
  process_name: "Retail Customer Onboarding (CIP / KYC)"
  product: "Retail deposit and digital banking onboarding"
  business_unit: "Retail Banking & Onboarding"
  description: "End-to-end retail customer onboarding workflow covering identity verification, OFAC screening, customer due diligence, account opening, initial funding controls, and ongoing CIP exception remediation. Process serves both branch-originated and digital channels with shared identity, screening, and account-opening systems."
  systems:
    - "Digital Onboarding Platform"
    - "Identity Verification Service"
    - "OFAC Screening Engine"
    - "Customer Due Diligence Workflow"
    - "Core Banking Deposit System"
    - "Document Management Repository"
  stakeholders:
    - "Retail Compliance Officer"
    - "BSA Officer"
    - "Privacy Office"
    - "Fraud Operations Manager"
    - "Branch Operations Manager"
    - "Digital Channel Owner"
    - "Information Security"

# ---------------------------------------------------------------------------
# Bank controls supporting the procedure
# ---------------------------------------------------------------------------
controls:
  - control_id: "CTRL-ONB-001"
    control_name: "CIP identity verification at account opening"
    control_type: "Client Due Diligence and Transaction Monitoring"
    owner: "Retail Compliance Officer"
    frequency: "Per account opening"
    description: "Identity verification using documentary and non-documentary methods at account opening, with required-field completion and 5-business-day resolution window for exceptions."
    design_rating: "Satisfactory"
    operating_rating: "Improvement Needed"
    design_rationale: "Control is designed to enforce CIP requirements with exception workflow, but does not yet block account funding when CIP is incomplete."
    operating_rationale: "Last quarter showed 2.4% of accounts opened with CIP exception not closed within 5-business-day window."
    risk_mitigations:
      RIB-COM: "CIP enforcement is the foundational mitigant for BSA/AML compliance risk; required for account opening regardless of channel."
      RIB-EFR: "Identity verification reduces synthetic-identity and impersonation fraud risk at the entry point."
      RIB-PRI: "Documented identity collection scope provides the basis for downstream privacy notices and data minimization."
    coverage_by_risk:
      RIB-COM: "strong"
      RIB-EFR: "partial"
      RIB-PRI: "partial"
    open_issues:
      - issue_id: "IS-ONB-003"
        description: "Aged CIP exceptions not yet auto-blocked from receiving incoming wires until closed."
        severity: "High"
        age_days: 42
        owner: "Digital Channel Owner"
        status: "In Remediation"
    evidence_quality:
      rating: "Adequate"
      last_tested: "2026-03-08"
      sample_size: 50
      exceptions_noted: 4
      notes: "QA sample of 50 new accounts; 4 had CIP exception aging past 5 business days."

  - control_id: "CTRL-ONB-002"
    control_name: "OFAC screening with secondary review"
    control_type: "Automated Rules"
    owner: "BSA Officer"
    frequency: "Per account opening and refreshed weekly"
    description: "Real-time OFAC screening at onboarding with manual secondary review of potential matches and weekly portfolio rescreening against updated lists."
    design_rating: "Strong"
    operating_rating: "Satisfactory"
    design_rationale: "Real-time and recurring screening with maker-checker on potential matches; full audit trail in screening engine."
    operating_rationale: "Sampled population shows 100% real-time screening; secondary review SLA met on 96% of potential matches."
    risk_mitigations:
      RIB-COM: "Screening is the OFAC-mandated control; secondary review prevents false negatives from automated decisioning."
    coverage_by_risk:
      RIB-COM: "strong"
    evidence_quality:
      rating: "Strong"
      last_tested: "2026-02-20"
      sample_size: 60
      exceptions_noted: 2
      notes: "Two secondary reviews completed 1 business day late; no missed true matches."

  - control_id: "CTRL-ONB-003"
    control_name: "Customer due diligence (CDD) tiered review"
    control_type: "Client Due Diligence and Transaction Monitoring"
    owner: "BSA Officer"
    frequency: "Per account opening; enhanced review per risk tier"
    description: "Tiered customer due diligence with documented questionnaires, source-of-funds collection for medium/high-risk customers, and enhanced due diligence (EDD) for high-risk."
    design_rating: "Satisfactory"
    operating_rating: "Satisfactory"
    design_rationale: "Tiered approach aligned to FFIEC BSA exam manual; EDD documented with senior compliance review."
    operating_rationale: "Sample evidence shows tiering applied consistently; 3% of medium-risk accounts missing source-of-funds documentation."
    risk_mitigations:
      RIB-COM: "Tiered CDD enables proportionate AML controls and supports suspicious activity monitoring."
    coverage_by_risk:
      RIB-COM: "partial"
    evidence_quality:
      rating: "Adequate"
      last_tested: "2026-02-25"
      sample_size: 45
      exceptions_noted: 3

  - control_id: "CTRL-ONB-004"
    control_name: "Synthetic identity model with manual fraud review"
    control_type: "Surveillance"
    owner: "Fraud Operations Manager"
    frequency: "Real-time at application + monthly model performance review"
    description: "Synthetic-identity detection model flags applications for manual fraud review; model precision and recall monitored monthly."
    design_rating: "Satisfactory"
    operating_rating: "Improvement Needed"
    design_rationale: "Model + human review combination is industry standard; thresholds documented and approved by Model Risk Management."
    operating_rationale: "Latest model performance shows 18% confirmation rate on flagged applications, below the 35% green threshold; potential model drift."
    risk_mitigations:
      RIB-EFR: "Detection-and-review pattern reduces synthetic-identity onboarding losses."
    coverage_by_risk:
      RIB-EFR: "partial"
    open_issues:
      - issue_id: "IS-ONB-007"
        description: "Synthetic-identity model precision below 20% in latest monthly review; recalibration not yet scheduled."
        severity: "Medium"
        age_days: 22
        owner: "Fraud Operations Manager"
        status: "Open"
    evidence_quality:
      rating: "Adequate"
      last_tested: "2026-03-12"
      sample_size: 80
      exceptions_noted: 14
      notes: "80 flagged applications reviewed; 14 confirmed fraud or high-risk."

  - control_id: "CTRL-ONB-005"
    control_name: "Privacy notice delivery and consent capture"
    control_type: "Directive"
    owner: "Chief Privacy Officer"
    frequency: "Per account opening"
    description: "Initial privacy notice and required consents delivered and electronically attested at account opening, archived in document repository for regulatory response window."
    design_rating: "Strong"
    operating_rating: "Strong"
    design_rationale: "Notice delivery is system-enforced before account funding; consents captured with timestamps."
    operating_rationale: "Sample evidence shows 100% of accounts have notice delivery and consent records."
    risk_mitigations:
      RIB-PRI: "Notice and consent capture establishes the lawful basis for subsequent data processing and supports DSAR responses."
    coverage_by_risk:
      RIB-PRI: "strong"
    evidence_quality:
      rating: "Strong"
      last_tested: "2026-03-01"
      sample_size: 50
      exceptions_noted: 0

# ---------------------------------------------------------------------------
# Risks
# ---------------------------------------------------------------------------
risks:
  - taxonomy_node_id: "RIB-COM"
    risk_id: "RI-CONB-001"
    risk_description: "Customer Identification Program or Customer Due Diligence may be incomplete, inconsistently applied, or remediated outside the regulatory window, creating BSA/AML compliance exposure."
    risk_event: "An account is opened and funded while the CIP exception remains unresolved past the 5-business-day window, creating a recordable BSA finding."
    applicability_rationale: "Compliance Risk materializes because the process is governed by BSA/AML, OFAC, and FinCEN CDD obligations with hard regulatory clocks and recordable findings on failure."
    confidence: 0.92
    causes:
      - "manual workflow"
      - "incomplete documentation"
      - "weak segregation monitoring"
      - "delayed access removal"
    consequences:
      - "BSA examination findings"
      - "matters requiring attention (MRA)"
      - "civil money penalties"
      - "remediation cost"
    impact_scores:
      financial_impact: 3
      regulatory_impact: 4
      reputational_impact: 3
    overall_impact_score: 4
    overall_impact_rationale: "Overall impact is Severe because regulatory dimension drives the rating: BSA findings are recordable, escalate to enforcement under repeat patterns, and create material reputational exposure."
    likelihood_score: 3
    likelihood_rating: "Medium High"
    likelihood_rationale: "Likelihood is Medium High because the prior-quarter QA sample showed 2.4% CIP late-resolution rate (above the 1.5% green threshold), with no operating control yet enforcing funding-block on aged exceptions."
    assumptions:
      - "Daily new-account volumes remain consistent with prior quarter."
      - "QA sampling methodology remains constant across quarters."
    exposure_metrics:
      - metric_name: "CIP late-resolution rate"
        metric_value: "2.4%"
        metric_unit: "% of new accounts"
        description: "Share of new accounts where CIP exception was not resolved within the 5-business-day window."
        source: "BSA QA monthly sample"
        supports: ["likelihood"]
      - metric_name: "aged CIP exceptions"
        metric_value: "32"
        metric_unit: "open at month-end"
        description: "CIP exceptions open beyond the 5-business-day target at month-end."
        source: "Onboarding platform exception report"
        supports: ["likelihood", "impact"]
      - metric_name: "monthly new account volume"
        metric_value: "4,200"
        metric_unit: "accounts opened per month"
        description: "Average monthly retail account opening volume across branch and digital channels."
        source: "Core Banking Deposit System"
        supports: ["impact"]
    mapped_controls: ["CTRL-ONB-001", "CTRL-ONB-002", "CTRL-ONB-003"]
    recommended_action: "Implement system-enforced funding-block on accounts with aged CIP exceptions and reduce monthly QA threshold from 50 to 100 accounts to validate remediation."
    coverage_gaps:
      - "CIP exception aging is not yet enforced as a system block on inbound wires or large transactions."
      - "EDD reviewers do not have a documented checklist for source-of-funds verification."
    action_plan:
      - action: "Implement system-enforced funding-block for accounts with CIP exceptions > 5 business days."
        owner: "Digital Channel Owner"
        due_date: "2026-Q2"
        status: "In Progress"
        priority: "Critical"
      - action: "Increase monthly CIP QA sample size from 50 to 100 accounts to confirm remediation effectiveness."
        owner: "BSA Officer"
        due_date: "2026-Q2"
        status: "Planned"
        priority: "High"
      - action: "Document EDD source-of-funds verification checklist and incorporate into reviewer training."
        owner: "Retail Compliance Officer"
        due_date: "2026-Q3"
        status: "Planned"
        priority: "Medium"
    review:
      reviewer: "BSA Officer"
      review_status: "Challenged"
      approval_status: "Pending"
      challenge_comments: "Residual rating elevated to High pending implementation of automated funding-block. CRO escalation triggered per appetite framework (Compliance threshold: Low)."
      challenged_fields: ["likelihood_score", "control_operating_effectiveness", "management_response"]
      ai_original_value: "Residual rating: Medium-22"
      reviewer_adjusted_value: "Residual rating: High-32; Management response: Mitigate (active remediation)"
      reviewer_rationale: "Override raised residual to High based on (1) sustained breach of green threshold over two consecutive quarters, (2) absence of automated enforcement, and (3) regulatory clock that does not tolerate aging. Aligned with appetite framework requiring CRO escalation when Compliance residual is two or more bands above Low threshold."
    evidence_references:
      - evidence_id: "CONB-EVID-001"
        evidence_type: "BSA QA report"
        description: "Monthly BSA QA sampling results with aged CIP detail."
        source: "BSA QA reporting workbook"

  - taxonomy_node_id: "RIB-EFR"
    risk_id: "RI-CONB-002"
    risk_description: "External actors may submit synthetic-identity or impersonation applications that bypass identity verification and result in fraudulent account openings."
    risk_event: "A synthetic-identity application receives below-threshold fraud model score, passes manual review without escalation, and is funded before subsequent fraud detection."
    applicability_rationale: "External Fraud Risk materializes because retail onboarding is the primary fraud-entry vector and current model precision suggests potential under-detection."
    confidence: 0.86
    causes:
      - "social engineering"
      - "fraudulent instructions"
      - "weak authentication"
    consequences:
      - "fraud loss on funded accounts"
      - "downstream payment fraud"
      - "BSA SAR filing obligation"
    impact_scores:
      financial_impact: 3
      regulatory_impact: 2
      reputational_impact: 3
    overall_impact_score: 3
    overall_impact_rationale: "Overall impact is Significant because fraudulent accounts drive direct loss, downstream fraud exposure, and reputational signal in published fraud statistics."
    likelihood_score: 3
    likelihood_rating: "Medium High"
    likelihood_rationale: "Likelihood is Medium High because synthetic-identity model precision dropped to 18% in the latest monthly review, indicating potential drift and elevated false-negative rate."
    assumptions:
      - "Model performance reflects underlying fraud population, not random sampling variance."
      - "Confirmed fraud rate on non-flagged applications is stable."
    exposure_metrics:
      - metric_name: "model precision"
        metric_value: "18%"
        metric_unit: "% of flagged applications confirmed fraud"
        description: "Share of synthetic-identity model flags confirmed as fraud in manual review."
        source: "Fraud operations monthly review"
        supports: ["likelihood"]
      - metric_name: "confirmed synthetic identity losses"
        metric_value: "$185K"
        metric_unit: "trailing 90-day losses"
        description: "Confirmed losses attributable to synthetic-identity onboarding in the trailing 90 days."
        source: "Fraud operations loss ledger"
        supports: ["impact"]
      - metric_name: "monthly application volume"
        metric_value: "5,400"
        metric_unit: "applications submitted per month"
        description: "Total retail account applications received across channels."
        source: "Digital Onboarding Platform"
        supports: ["impact"]
    mapped_controls: ["CTRL-ONB-004", "CTRL-ONB-001"]
    recommended_action: "Recalibrate the synthetic-identity model with the latest 12-month fraud-confirmed sample and add channel-specific velocity rules for digital applications."
    coverage_gaps:
      - "No automated velocity control on applications from the same device or IP within a short window."
      - "Model recalibration cadence not yet documented in MRM standards."
    action_plan:
      - action: "Recalibrate synthetic-identity model with current confirmed-fraud sample and validate against MRM standards."
        owner: "Fraud Operations Manager"
        due_date: "2026-Q2"
        status: "In Progress"
        priority: "High"
      - action: "Implement velocity rules for applications from the same device, IP, or contact attribute within 24 hours."
        owner: "Digital Channel Owner"
        due_date: "2026-Q3"
        status: "Planned"
        priority: "Medium"
    review:
      reviewer: "Fraud Operations Manager"
      review_status: "Pending Review"
      approval_status: "Pending"
      challenge_comments: "Confirm model recalibration timeline and validate whether 18% precision reflects true drift versus sampling variance. Recommend interim manual review threshold lowering."
      challenged_fields: ["likelihood_score", "control_design_effectiveness"]

  - taxonomy_node_id: "RIB-PRI"
    risk_id: "RI-CONB-003"
    risk_description: "Customer personal data collected during onboarding may be processed, retained, or shared in a manner inconsistent with the privacy notice or applicable privacy law, creating customer harm and regulatory exposure."
    risk_event: "Data minimization controls are not enforced for non-required identity attributes, leading to data retention beyond the documented purpose and an inability to respond to a deletion request within the regulatory window."
    applicability_rationale: "Privacy Risk materializes because onboarding is the most sensitive data collection point in the customer lifecycle and the bank operates in jurisdictions with explicit DSAR obligations."
    confidence: 0.84
    causes:
      - "weak data classification"
      - "manual data entry"
      - "unclear ownership"
    consequences:
      - "DSAR response delays"
      - "GLBA / state privacy violations"
      - "customer complaints"
    impact_scores:
      financial_impact: 2
      regulatory_impact: 3
      reputational_impact: 3
    overall_impact_score: 3
    overall_impact_rationale: "Overall impact is Significant because privacy violations carry per-instance regulatory exposure and material reputational impact in retail markets."
    likelihood_score: 2
    likelihood_rating: "Medium Low"
    likelihood_rationale: "Likelihood is Medium Low because privacy notice delivery is strong, but data minimization for non-required attributes is not yet system-enforced and one DSAR response missed window in the prior quarter."
    assumptions:
      - "Privacy team capacity remains adequate for current DSAR volume."
      - "Data classification standards are stable across the measurement period."
    exposure_metrics:
      - metric_name: "DSAR volume"
        metric_value: "47"
        metric_unit: "requests in prior quarter"
        description: "Customer data subject access requests received in the prior quarter."
        source: "Privacy request management system"
        supports: ["likelihood"]
      - metric_name: "DSAR late responses"
        metric_value: "1"
        metric_unit: "request beyond regulatory window"
        description: "DSAR responses that exceeded the regulatory window in the prior quarter."
        source: "Privacy request management system"
        supports: ["likelihood", "impact"]
      - metric_name: "non-required attributes collected"
        metric_value: "12"
        metric_unit: "attributes per onboarding"
        description: "Count of non-required identity attributes captured at onboarding beyond the documented minimum set."
        source: "Onboarding data dictionary review"
        supports: ["impact"]
    mapped_controls: ["CTRL-ONB-005", "CTRL-ONB-001"]
    recommended_action: "Reduce non-required attribute collection at onboarding and implement automated DSAR routing with SLA timer integrated into the privacy request system."
    coverage_gaps:
      - "Data minimization not enforced at the form-design layer; relies on training and procedure."
      - "No automated SLA timer on DSAR records."
    action_plan:
      - action: "Conduct data-minimization review of onboarding forms and reduce non-required attribute count."
        owner: "Chief Privacy Officer"
        due_date: "2026-Q3"
        status: "Planned"
        priority: "Medium"
      - action: "Integrate DSAR SLA timer with automated escalation in privacy request management system."
        owner: "Technology Owner"
        due_date: "2026-Q3"
        status: "Planned"
        priority: "Medium"
    review:
      reviewer: "Chief Privacy Officer"
      review_status: "Approved"
      approval_status: "Approved"
      challenge_comments: "Approved at current rating with action plan tracking data-minimization remediation."
      challenged_fields: ["impact_scores", "control_mapping"]

  - taxonomy_node_id: "RIB-DM"
    risk_id: "RI-CONB-004"
    risk_description: "Customer information collected at onboarding may be inaccurate, incomplete, or inconsistently propagated across onboarding, core banking, and downstream systems, causing servicing errors and CIP/CDD remediation work."
    risk_event: "An onboarding system update populates a customer's risk-tier field incorrectly in the core banking system, causing CDD reviewers to apply standard rather than enhanced due diligence."
    applicability_rationale: "Data Management Risk materializes because onboarding writes customer master data that drives multiple downstream control decisions including CDD tiering, fraud monitoring, and product eligibility."
    confidence: 0.81
    causes:
      - "interface breaks"
      - "manual data entry"
      - "missing required fields"
    consequences:
      - "incorrect CDD tiering"
      - "CIP rework"
      - "downstream servicing errors"
    impact_scores:
      financial_impact: 2
      regulatory_impact: 3
      reputational_impact: 2
    overall_impact_score: 3
    overall_impact_rationale: "Overall impact is Significant because incorrect customer master data can drive incorrect CDD/AML decisions with regulatory consequences."
    likelihood_score: 2
    likelihood_rating: "Medium Low"
    likelihood_rationale: "Likelihood is Medium Low because reconciliation between onboarding and core banking is automated, with 6 breaks identified and remediated in the prior quarter."
    assumptions:
      - "Interface monitoring runs daily."
    exposure_metrics:
      - metric_name: "onboarding-to-core reconciliation breaks"
        metric_value: "6"
        metric_unit: "breaks identified in prior quarter"
        description: "Customer master data reconciliation breaks between onboarding and core banking."
        source: "Daily reconciliation log"
        supports: ["likelihood"]
      - metric_name: "required-field completeness"
        metric_value: "97.4%"
        metric_unit: "% of new accounts"
        description: "Share of new accounts with all required customer master fields populated."
        source: "Daily data quality dashboard"
        supports: ["likelihood"]
    mapped_controls: ["CTRL-ONB-001", "CTRL-ONB-003"]
    recommended_action: "Establish weekly review of customer master data reconciliation breaks with root-cause categorization by upstream source."
    coverage_gaps:
      - "Risk-tier field changes are not yet alerted in the CDD workflow."
    action_plan:
      - action: "Add real-time alerting for risk-tier field changes in the CDD workflow."
        owner: "Technology Owner"
        due_date: "2026-Q3"
        status: "Planned"
        priority: "Medium"
    review:
      reviewer: "Operations Data Steward"
      review_status: "Approved"
      approval_status: "Approved"
      challenge_comments: "Approved at current rating with action plan tracking risk-tier alerting."
      challenged_fields: []

executive_summary:
  headline: "Retail Customer Onboarding shows one high residual compliance risk (CIP enforcement) and elevated external-fraud exposure tied to model drift; privacy and data-management residuals are within appetite."
  key_messages:
    - "CIP exception aging is the dominant residual concern, with CRO escalation triggered per the Compliance appetite threshold (Low)."
    - "External fraud residual is elevated by suspected synthetic-identity model drift; recalibration is in progress and interim review thresholds should be tightened."
    - "Privacy controls are operating, but data-minimization improvements are required to keep DSAR-response within the regulatory window."
  top_residual_risks:
    - "Compliance Risk (CIP / CDD): High"
    - "External Fraud Risk (Synthetic Identity): Medium-High"
    - "Privacy Risk (Data Minimization & DSAR): Medium"
  recommended_actions:
    - "Implement system-enforced funding-block for aged CIP exceptions before Q3 BSA exam window."
    - "Recalibrate synthetic-identity model and add device/IP velocity rules at the digital onboarding channel."
    - "Reduce non-required attribute collection and integrate DSAR SLA timer with automated escalation."

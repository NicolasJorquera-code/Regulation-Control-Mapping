- kri_id: KRI-PAYEXC-IFR-001
  kri_name: High-Value Release Approval Evidence Gaps
  risk_taxonomy_id: RIB-IFR
  metric_definition: Percentage of sampled high-value releases lacking reviewer note, source-document link, approver independence,
    or evidence that the final wire output was reviewed before release.
  formula: sampled high-value releases with approval-evidence gaps / sampled high-value releases * 100
  unit: '%'
  measurement_frequency: Monthly
  data_source: Payment Exception Workflow QA, approval log, and sensitive-entitlement monitoring report
  owner: Loan Agency Operations Lead
  thresholds:
    green: <2%
    amber: 2% to 5%
    red: '>5%'
  rationale: This KRI connects maker/checker control quality with override risk by measuring whether approval evidence proves
    independent challenge, not merely that a workflow status changed to approved.
  escalation_path: Loan Agency Operations Lead -> Internal Fraud Risk Partner -> Second Line Operational Risk Partner -> Operational Risk Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.

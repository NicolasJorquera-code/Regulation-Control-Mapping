version: 1.2.0
kri_library:
- kri_id: KRI-PAYEXC-BPR-001
  kri_name: High-Value Repair Validation Exception Rate
  risk_taxonomy_id: RIB-BPR
  metric_definition: Percentage of sampled high-value repaired wires with missing payment-intent or amount-validation evidence.
  formula: validation exceptions / sampled high-value repairs * 100
  unit: '%'
  measurement_frequency: Weekly
  data_source: QA testing workbook
  owner: Payment Operations Manager
  thresholds:
    green: <2%
    amber: 2% to 5%
    red: '>5%'
  rationale: Directly monitors the control weakness most likely to cause unintended payment release.
  escalation_path: Payment Operations Manager -> Second Line Operational Risk Partner -> Risk Governance Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-PAYEXC-DM-001
  kri_name: Payment Notice to Wire File Mismatch Count
  risk_taxonomy_id: RIB-DM
  metric_definition: Count of payment notice, beneficiary, principal/interest, or wire-file mismatches identified before
    or after release.
  formula: mismatches identified in period
  unit: count
  measurement_frequency: Daily
  data_source: Loan Agency QA dashboard
  owner: Loan Agency Operations Lead
  thresholds:
    green: '0'
    amber: 1 to 2
    red: '>2'
  rationale: Monitors the key data-quality driver for erroneous release and post-release reconciliation breaks.
  escalation_path: Loan Agency Operations Lead -> Second Line Operational Risk Partner -> Risk Governance Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-PAYEXC-CYB-001
  kri_name: Overdue Privileged Payment Setup Access
  risk_taxonomy_id: RIB-CYB
  metric_definition: Number of payment setup or emergency access entitlements past recertification or closure target.
  formula: overdue privileged entitlements
  unit: count
  measurement_frequency: Weekly
  data_source: Identity governance dashboard
  owner: Payment Platform Owner
  thresholds:
    green: '0'
    amber: '1'
    red: '>1'
  rationale: Sensitive access can change payment release behavior and should remain low tolerance.
  escalation_path: Payment Platform Owner -> Second Line Operational Risk Partner -> Risk Governance Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-GEN-004
  kri_name: Regulatory Compliance Threshold Indicator 04
  risk_taxonomy_id: RIB-COM
  metric_definition: Measures current-period movement in regulatory compliance exposure against the generic profile threshold.
  formula: current exceptions / in-scope population * 100
  unit: '%'
  measurement_frequency: Monthly
  data_source: KRI dashboard source pack
  owner: Business Unit Risk Owner
  thresholds:
    green: <2
    amber: 2 to 5
    red: '>5'
  rationale: Provides a leading indicator for regulatory compliance in the selected knowledge-base archetype.
  escalation_path: Process Owner -> BU Risk Owner -> Second Line Risk Partner -> Risk Governance Committee
  use_cases:
  - BU scorecard
  - Executive risk pack
  placement_guidance: Use in the Knowledge Base profile matrix and selected risk detail drawer.
- kri_id: KRI-PAYEXC-ORS-001
  kri_name: Aged Recall or High-Value Exception Cases
  risk_taxonomy_id: RIB-ORS

  rationale: Provides a leading indicator for regulatory compliance in the selected knowledge-base archetype.
  escalation_path: Process Owner -> BU Risk Owner -> Second Line Risk Partner -> Risk Governance Committee
  use_cases:
  - BU scorecard
  - Executive risk pack
  placement_guidance: Use in the Knowledge Base profile matrix and selected risk detail drawer.
- kri_id: KRI-PAYEXC-ORS-001
  kri_name: Aged Recall or High-Value Exception Cases
  risk_taxonomy_id: RIB-ORS
  metric_definition: Count of suspected erroneous-payment, recall, hold, or high-value exception cases open beyond the documented
    same-day escalation target or missing a required owner, timestamp, or next action.
  formula: open recall or high-value exception cases over target age + cases missing owner/timestamp/next action
  unit: count
  measurement_frequency: Daily
  data_source: Payment Exception Workflow, recall playbook tracker, and incident management repository
  owner: Payment Operations Manager
  thresholds:
    green: '0'
    amber: 1 to 2
    red: '>2'
  rationale: This indicator measures whether the bank can execute the response playbook while recovery options are still viable
    and before legal, treasury, or accounting uncertainty becomes prolonged.
  escalation_path: Payment Operations Manager -> Treasury Operations Controller -> Legal Response Lead -> Operational Resilience Forum
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-PAYEXC-TPR-001
  kri_name: Counterparty Recall Response SLA Misses
  risk_taxonomy_id: RIB-TPR
  metric_definition: Number of live recall events, hold requests, return requests, or tabletop simulations where correspondent,
    custodian, or recipient-institution acknowledgement or action missed the documented response target.
  formula: external recall or hold requests missing acknowledgement/action target in the reporting period
  unit: count
  measurement_frequency: Quarterly
  data_source: Recall playbook tracker, correspondent contact inventory, and incident simulation record
  owner: Treasury Operations Controller
  thresholds:
    green: '0'
    amber: '1'
    red: '>1'
  rationale: After settlement, recovery depends on external institutions; this KRI distinguishes internal recall execution
    from the third-party response risk that management cannot directly control.
  escalation_path: Treasury Operations Controller -> Relationship Manager -> Third Party Risk Partner -> Payment Risk Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.

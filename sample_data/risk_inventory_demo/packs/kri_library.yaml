version: 1.2.0
kri_library:
- kri_id: KRI-PAYEXC-BPR-001
  kri_name: High-Value Repair Validation Exception Rate
  risk_taxonomy_id: RIB-BPR
  metric_definition: Percentage of sampled high-value repaired wires where the approval package does not evidence independent
    validation of payment intent, amount, beneficiary, value date, and final generated wire detail before release.
  formula: sampled releases with missing or incomplete intent-validation evidence / sampled high-value repaired releases * 100
  unit: '%'
  measurement_frequency: Weekly
  data_source: Payment Exception Workflow QA sample and release approval evidence repository
  owner: Payment Operations Manager
  thresholds:
    green: <2%
    amber: 2% to 5%
    red: '>5%'
  rationale: This is the primary leading KRI for mistaken release risk because it tests whether payment intent was evidenced
    before funds left the bank, not after a reconciliation or recall activity identified a break.
  escalation_path: Payment Operations Manager -> Head of Payment Operations -> Second Line Operational Risk Partner -> Operational Risk Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-PAYEXC-DM-001
  kri_name: Payment Notice to Wire File Mismatch Count
  risk_taxonomy_id: RIB-DM
  metric_definition: Count of mismatches between the approved payment notice, exception case, generated wire file, SWIFT message,
    GL entry, or suspense/nostro record identified before release, during same-day close, or through post-release review.
  formula: unique notice-to-wire, wire-to-SWIFT, or payment-to-GL mismatches identified in the reporting period
  unit: count
  measurement_frequency: Daily
  data_source: Loan Agency QA dashboard, wire generation audit report, and daily GL/nostro reconciliation feed
  owner: Loan Agency Operations Lead
  thresholds:
    green: '0'
    amber: 1 to 2
    red: '>2'
  rationale: Mismatched payment data is the clearest upstream signal that an exception repair can become a funds-transfer
    error or an unresolved accounting break if not remediated before release.
  escalation_path: Loan Agency Operations Lead -> Payment Operations Manager -> Finance Control Lead -> Second Line Operational Risk Partner
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-PAYEXC-CYB-001
  kri_name: Overdue Privileged Payment Setup Access
  risk_taxonomy_id: RIB-CYB
  metric_definition: Number of privileged payment setup, routing, template, release-queue, or emergency-access entitlements
    that are past recertification, approval, or closure target at the reporting date.
  formula: overdue privileged setup entitlements + overdue emergency access grants + unrecertified sensitive roles
  unit: count
  measurement_frequency: Weekly
  data_source: Identity governance dashboard, emergency-access log, and payment-platform entitlement extract
  owner: Payment Platform Owner
  thresholds:
    green: '0'
    amber: '1'
    red: '>1'
  rationale: Privileged setup access can change how payment repairs are routed, generated, or approved; tolerance must remain
    low because one unauthorized configuration change can affect multiple high-value releases.
  escalation_path: Payment Platform Owner -> Cyber Access Governance Lead -> Payment Operations Manager -> Technology Risk Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.
- kri_id: KRI-GEN-004
  kri_name: Regulatory Compliance Threshold Indicator 04
  risk_taxonomy_id: RIB-COM
  metric_definition: Measures current-period movement in regulatory compliance exposure against the generic profile threshold.
  formula: current exceptions / in-scope population * 100
  unit: '%'

version: 1.2.0
kri_library:
- kri_id: KRI-GEN-001
  kri_name: Business Process Execution Threshold Indicator 01
  risk_taxonomy_id: RIB-BPR
  metric_definition: Measures current-period movement in business process execution exposure against the generic profile threshold.
  formula: current exceptions / in-scope population * 100
  unit: '%'
  measurement_frequency: Daily
  data_source: KRI dashboard source pack
  owner: Business Unit Risk Owner
  thresholds:
    green: <2
    amber: 2 to 5
    red: '>5'
  rationale: Provides a leading indicator for business process execution in the selected knowledge-base archetype.
  escalation_path: Process Owner -> BU Risk Owner -> Second Line Risk Partner -> Risk Governance Committee
  use_cases:
  - BU scorecard
  - Executive risk pack
  placement_guidance: Use in the Knowledge Base profile matrix and selected risk detail drawer.

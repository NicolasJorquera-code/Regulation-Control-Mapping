- kri_id: KRI-PAYEXC-RR-001
  kri_name: Material Payment Incident Escalation Gaps
  risk_taxonomy_id: RIB-RR
  metric_definition: Count of open findings, tabletop gaps, or live-event exceptions where materiality, executive notification,
    operational-loss capture, or regulatory-reporting assessment was late, incomplete, or not assigned to a named owner.
  formula: open material-payment incident governance gaps + late/incomplete notification or reporting assessments
  unit: count
  measurement_frequency: Monthly
  data_source: Operational Risk Governance Repository, incident tabletop tracker, and operational loss event log
  owner: Legal and Regulatory Response Lead
  thresholds:
    green: '0'
    amber: '1'
    red: '>1'
  rationale: Management needs this KRI because a payment error can become a governance failure if classification, reporting,
    and executive notification do not occur on the same evidentiary timeline as recall and accounting actions.
  escalation_path: Legal and Regulatory Response Lead -> Compliance Advisory Lead -> Head of Operational Risk -> Risk Governance Committee
  use_cases:
  - Selected risk monitoring
  - Payment operations scorecard
  - Executive risk pack
  placement_guidance: Use for the single-process Payment Exception Handling demo and selected risk detail cards.

- obligation_id: OBL-PAYEXC-001
  name: Payment-system internal controls and exception processing
  framework: OCC Payment Systems Comptroller Handbook
  citation: Payment systems risk management and exception review expectations
  description: Payment exception procedures should define internal controls, exception review, escalation, and independent
    review expectations.
  process_ids:
  - PROC-PAY-EXCEPTION
  risk_taxonomy_ids:
  - RIB-BPR
  - RIB-DM
  control_expectations:
  - High-value release approval evidence retained
  - Exception aging and escalation monitored
  - Independent risk-based review performed

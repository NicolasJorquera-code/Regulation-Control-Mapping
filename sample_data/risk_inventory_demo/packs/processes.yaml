version: 1.2.0
processes:
- process_id: PROC-PAY-EXCEPTION
  process_name: Payment Exception Handling
  bu_id: BU-PAYOPS
  description: High-value wire exception repair, payment-intent validation, release approval, recall handling, and daily
    GL/nostro reconciliation for failed, amended, duplicate, or disputed payment instructions.
  owner: Payment Operations Manager
  last_reviewed: '2026-04-30'
  cadence: Intraday release monitoring with daily close certification and monthly governance review
  criticality: Critical
  related_systems:
  - Payment Exception Workflow
  - Wire Transfer Gateway
  - Loan Agency Payment Module
  - Payment Intent Validation Service
  - SWIFT Messaging Gateway
  - General Ledger Reconciliation Platform
  upstream_dependencies:
  - Loan agency payment notice
  - Payment intake queue
  - Sanctions screening disposition
  - Customer or counterparty amendment request
  downstream_dependencies:
  - Wire release gateway
  - Recall and return workflow
  - General ledger close
  - Operational loss event reporting
  event_triggers:
  - High-value repaired wire ready for release
  - Payment notice and wire-file mismatch
  - Recall or hold request received
  - Unreconciled GL or nostro break
  data_objects:
  - Payment notice
  - Wire file
  - Beneficiary instruction
  - Approval log
  - Recall notice
  - GL/suspense break
  apqc_crosswalk:
    framework: APQC Banking PCF
    version: 7.2.2
    process_id: banking-payment-operations-exceptions
    process_name: Manage high-value payment exceptions and recalls
    confidence: 0.81
    rationale: Optional normalization metadata; risk conclusions are driven by payment workflow evidence, controls, issues,
      KRIs, and scoring matrices.
- process_id: PROC-PAY-RECON
  process_name: End-of-Day Wire Reconciliation
  bu_id: BU-PAYOPS
  description: Daily reconciliation of high-value payment activity to settlement reports, ledger postings, and exception-aging
    logs before close certification.
  owner: Treasury Operations Lead
  last_reviewed: '2026-04-30'
  cadence: Daily
  criticality: Critical
  related_systems:
  - Wire Transfer Gateway
  - Settlement Statement Portal
  - General Ledger Reconciliation Platform
  - Treasury Workstation
  upstream_dependencies:
  - Settlement statement feed
  - Wire operations closeout
  - Ledger batch
  downstream_dependencies:
  - Cash position certification
  - GL close
  - Regulatory reporting input
  event_triggers:
  - End-of-day close
  - Unmatched settlement item
  - Ledger variance
  data_objects:
  - Wire transaction
  - Ledger posting
  - Settlement statement
  - Reconciliation break
  - Supervisor sign-off
  apqc_crosswalk:
    framework: APQC Banking PCF
    version: 7.2.2
    process_id: banking-payment-reconciliation
    process_name: Reconcile payments and settlement activity
    confidence: 0.74
    rationale: Optional process benchmark metadata; not used for scoring.

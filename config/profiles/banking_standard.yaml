        - Surveillance
        - Physical Safeguards
        - Business Continuity Planning and Awareness
        - Crisis Management
        - Technology Disaster Recovery
        - Staffing and Resourcing Adequacy
        - Internal Compliance Monitoring
        - Talent Management Practices
        - System and Application Restrictions
        - Data Security and Protection
    registry:
      roles:
        - Product Manager
        - Product Development Analyst
        - Product Owner
        - Head of Product Management
        - New Product Approval Committee Member
        - Pricing Analyst
        - Product Compliance Officer
        - Product Risk Officer
      systems:
        - Product Lifecycle Management Platform
        - Product Pricing and Profitability System

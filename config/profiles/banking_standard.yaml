name: "banking-standard"
description: "Full banking config — 25 control types, 17 business units, 13 APQC process areas. Equivalent to the current ControlNexus default setup."

# ── Control Types ─────────────────────────────────────────────────────────────

control_types:
  - name: Reconciliation
    definition: "Comparison of features, transactions, activities, or data to validate the accuracy, completeness, or appropriateness of the target outputs. This should include discrete steps for investigating and resolving any discrepancies that are identified."
    code: REC
    min_frequency_tier: Monthly
    placement_categories: [Detective]

  - name: Authorization
    definition: "Review and validation of documentation, transaction information, or other details to determine whether they are appropriate, complete, or accurate before allowing a process or activity to continue."
    code: AUT
    min_frequency_tier: Quarterly
    placement_categories: [Preventive]

  - name: Verification and Validation
    definition: "Examining information (e.g., documentation, transaction details) to validate the accuracy, appropriateness, or completeness of information or the completion of required actions."
    code: VNV
    min_frequency_tier: Quarterly
    placement_categories: [Detective]

  - name: Exception Reporting
    definition: "Creation of reports and alerts to identify risk limit breaches, system capacity constraints or breakdowns, ageing items, outstanding requests or activities that need to be closed out or resolved."
    code: EXR
    min_frequency_tier: Monthly
    placement_categories: [Detective]

  - name: Segregation of Duties
    definition: "Organize or assign activities, responsibilities, or tasks within a process such that no individual or group is able to complete the process on their own thereby limiting the potential for manipulating the outputs or outcomes of the process."
    code: SOD
    min_frequency_tier: Quarterly
    placement_categories: [Preventive]

  - name: "Documentation, Data, and Activity Completeness and Appropriateness Checks"
    definition: "Review, approval, and management of data, documentation, and assigned activities to validate completeness, accuracy, and appropriateness of information and outputs, and securing alternative methods to capture and restore access to missing or lost data."
    code: DOC
    placement_categories: [Preventive]

  - name: Internal and External Audits
    definition: "Testing and review of internal controls or processes to assess effectiveness or determine alignment with regulatory requirements."
    code: AUD
    placement_categories: [Detective]

  - name: Automated Rules
    definition: "Implementation of pre-defined rules into systems or applications to control or restrict the execution of actions (e.g., the types of data required, the types of actions permitted)."
    code: ARL
    min_frequency_tier: Monthly
    placement_categories: [Preventive]

  - name: Risk Escalation Processes
    definition: "Establishing mechanisms for reporting and alerting relevant stakeholders to violations, breaches, or transgressions of risk limits, operational thresholds, or internal employee misconduct, including via the use of whistleblower hotlines."
    code: REP
    min_frequency_tier: Quarterly
    placement_categories: [Detective]

  - name: Training and Awareness Programs
    definition: "Development and implementation of mechanisms to formally transfer knowledge such as training courses or online self-learning modules to assess the level of desired knowledge, skills, or competence attained. Any training program must have a formal, standardized curriculum, must include tracked attendance, and must include an escalation protocol for instances of non-attendance."
    code: TRN
    placement_categories: [Preventive]

  - name: System and Application Restrictions
    definition: "Restrict, control, or manage the access of users to enterprise devices, intranet portals, software, or internal or external networks based on their level of access credentials or user privileges to prevent unauthorized access or changes to enterprise applications or hardware."
    code: SAR
    placement_categories: [Preventive]

  - name: Data Security and Protection
    definition: "Securely storing, maintaining, and safeguarding data to prevent the disclosure, destruction, corruption, or unauthorized access of enterprise or client data including use of encryption, alternative data servers, and firewalls."
    code: DSP
    placement_categories: [Preventive]

  - name: Client Due Diligence and Transaction Monitoring
    definition: "Performing validation of client identity and documentation during onboarding, reviewing client transactions and activities for suspicious behaviors or anomalies, and periodically updating client risk profiles to refresh level of risk-based monitoring."
    placement_categories: [Preventive]

  - name: Surveillance
    definition: "Monitoring, scanning, or observing behaviors, activities, or other data signals subject to ongoing change and modification and usually performed on a real-time basis."
    placement_categories: [Detective]

  - name: Physical Safeguards
    definition: "Implementing physical tools, infrastructure, or devices that are used to safeguard and protect physical assets including buildings, property, equipment, or documents."
    placement_categories: [Preventive]

  - name: Business Continuity Planning and Awareness
    definition: "Development and maintenance of business protocols and processes to be deployed in the event of an outage or crisis including identification of critical functions or stakeholders needed for discharging and sustaining business continuity activities during an active crisis."
    placement_categories: [Contingency Planning]

  - name: Crisis Management
    definition: "Implementation of business contingency plan and activation of response and communication strategy to provide messaging to stakeholders as well as monitoring and reporting on status of crisis management plan progress and milestones."
    placement_categories: [Contingency Planning]

  - name: Technology Disaster Recovery
    definition: "Development and maintenance of technology recovery plan to identify key systems and technology requirements needed to sustain business activities during a crisis and interventions to restore access to and preserve key technology systems."
    placement_categories: [Contingency Planning]

  - name: Staffing and Resourcing Adequacy
    definition: "Conducting a staffing and skills assessment or other similar resourcing assessment to determine the required levels of employee and operational capacity to execute business functions and activities across the enterprise."
    placement_categories: [Preventive]

  - name: Internal Compliance Monitoring
    definition: "Monitoring the release of material, non-public information from the enterprise and monitoring trading activity to identify illegal or prohibited transactions based on enterprise trading policies and practices."
    placement_categories: [Preventive]

  - name: Talent Management Practices
    definition: "Managing staff and resources to ensure appropriate alignment with business objectives, such as background checks, mandatory vacations, and registrations checks."
    placement_categories: [Preventive]

  - name: Risk and Compliance Assessments
    definition: "Conduct Business Unit and enterprise-wide assessments to identify inherent risks associated with business processes, measure effectiveness of controls, determine residual risk ratings, and identify additional risk mitigation activities to be undertaken in response to residual risks and identified issues."
    placement_categories: [Preventive]

  - name: Risk Limit Setting
    definition: "Setting risk limits and risk tolerance thresholds to govern enterprise risk appetite, enterprise and employee trading, and client activities, and establish system of alerts to notify relevant stakeholders of limit breaches."
    placement_categories: [Preventive]

  - name: System Change Management
    definition: "Perform software testing to validate the behavior of newly implemented or updated systems, assess the technical performance of hardware components, test the effectiveness and functionality of new products, and understand effects of system updates on existing infrastructure."
    placement_categories: [Preventive]

  - name: Third Party Due Diligence
    definition: "Perform due diligence on third-party vendors to understand risk exposures of outsourcing key business services and activities and assess the strength of the vendor control environment to understand vendor risk profile and suitability for engagement."
    code: THR
    placement_categories: [Preventive]


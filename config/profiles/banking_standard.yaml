        full_description: "Prior to launch of any new product or material modification to an existing product, the Product Manager submits the completed new product proposal including risk assessment, compliance review, and operational readiness certification to the New Product Approval Committee for multi-disciplinary review and formal approval, ensuring all risk, legal, compliance, and operational requirements have been satisfied."
        word_count: 52
        quality_rating: Strong


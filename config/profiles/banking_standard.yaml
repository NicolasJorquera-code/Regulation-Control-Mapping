frequency_tiers:
  - label: Daily
    rank: 1
    keywords: [daily, every day, each day, per day, day-end, day end, end of day, eod]
  - label: Weekly
    rank: 2
    keywords: [weekly, every week, each week, per week, biweekly, bi-weekly, fortnight]
  - label: Monthly
    rank: 3
